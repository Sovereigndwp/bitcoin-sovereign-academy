<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Bitcoin and the three monetary functions</title>
  <desc id="desc">Three columns — Store of Value, Medium of Exchange, Unit of Account — each labeled with Bitcoin's current status and the Bitcoin-stack layers that most credibly serve each function. Editorial-asymmetric layout in cream paper with burnished gold accents.</desc>

  <defs>
    <style>
      .ink { fill: #16181C; }
      .muted { fill: #64645F; }
      .gold { fill: #C8922A; }
      .gold-stroke { stroke: #C8922A; }
      .hairline { stroke: rgba(12,10,8,0.18); }
      .hairline-strong { stroke: rgba(12,10,8,0.30); }
      .serif { font-family: 'Playfair Display', 'Crimson Pro', Georgia, 'Times New Roman', serif; }
      .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: 'Inter', 'Helvetica Neue', Arial, system-ui, sans-serif; }
    </style>
  </defs>

  <!-- cream paper background -->
  <rect x="0" y="0" width="1200" height="630" fill="#F7F7F2"/>

  <!-- top hairline -->
  <line x1="64" y1="56" x2="1136" y2="56" class="hairline" stroke-width="1"/>

  <!-- eyebrow: gold diamond + mono label -->
  <g transform="translate(64, 88)">
    <rect x="0" y="-7" width="8" height="8" transform="rotate(45 4 -3)" class="gold" fill="#C8922A"/>
    <text x="22" y="0" class="mono ink" font-size="11" font-weight="500" letter-spacing="3.5" fill="#16181C">BITCOIN SOVEREIGN ACADEMY  ·  FOUNDATIONAL LAYER THESIS v4</text>
  </g>

  <!-- editorial title -->
  <text x="64" y="148" class="serif ink" font-size="40" font-weight="500" fill="#16181C">Three monetary functions,</text>
  <text x="64" y="190" class="serif ink" font-size="40" font-weight="500" fill="#16181C">one asset, <tspan class="serif gold" font-style="italic" fill="#C8922A">layered differently</tspan>.</text>

  <!-- subtle horizontal divider beneath title -->
  <line x1="64" y1="226" x2="1136" y2="226" class="hairline" stroke-width="1"/>

  <!-- ============ three columns ============ -->
  <!-- column 1: SoV -->
  <g transform="translate(64, 256)">
    <text x="0" y="0" class="mono muted" font-size="10" font-weight="700" letter-spacing="2.5" fill="#64645F">FUNCTION 01  ·  THE ASSET</text>
    <text x="0" y="36" class="serif ink" font-size="22" font-weight="500" fill="#16181C">Store of value</text>
    <text x="0" y="68" class="sans muted" font-size="13" fill="#64645F">
      <tspan x="0" dy="0">Holds purchasing power</tspan>
      <tspan x="0" dy="18">across time.</tspan>
    </text>
    <text x="0" y="124" class="mono muted" font-size="10" font-weight="500" letter-spacing="2" fill="#64645F">PROPERTIES</text>
    <text x="0" y="142" class="sans ink" font-size="12" fill="#16181C">Scarcity · verifiability · no dilution</text>
    <!-- status pill -->
    <g transform="translate(0, 168)">
      <rect x="0" y="0" width="6" height="6" transform="rotate(45 3 3)" class="gold" fill="#C8922A"/>
      <text x="16" y="9" class="mono ink" font-size="11" font-weight="700" letter-spacing="1.5" fill="#16181C">DOMINANT &amp; STRENGTHENING</text>
    </g>
  </g>

  <!-- vertical divider 1 -->
  <line x1="424" y1="244" x2="424" y2="448" class="hairline" stroke-width="1"/>

  <!-- column 2: MoE -->
  <g transform="translate(448, 256)">
    <text x="0" y="0" class="mono muted" font-size="10" font-weight="700" letter-spacing="2.5" fill="#64645F">FUNCTION 02  ·  THE RAIL</text>
    <text x="0" y="36" class="serif ink" font-size="22" font-weight="500" fill="#16181C">Medium of exchange</text>
    <text x="0" y="68" class="sans muted" font-size="13" fill="#64645F">
      <tspan x="0" dy="0">Settles present-day</tspan>
      <tspan x="0" dy="18">transactions.</tspan>
    </text>
    <text x="0" y="124" class="mono muted" font-size="10" font-weight="500" letter-spacing="2" fill="#64645F">PROPERTIES</text>
    <text x="0" y="142" class="sans ink" font-size="12" fill="#16181C">Speed · cost · merchant acceptance</text>
    <!-- status pill -->
    <g transform="translate(0, 168)">
      <rect x="0" y="0" width="6" height="6" transform="rotate(45 3 3)" class="gold" fill="#C8922A"/>
      <text x="16" y="9" class="mono ink" font-size="11" font-weight="700" letter-spacing="1.5" fill="#16181C">REAL, LAYERED, GROWING</text>
    </g>
  </g>

  <!-- vertical divider 2 -->
  <line x1="808" y1="244" x2="808" y2="448" class="hairline" stroke-width="1"/>

  <!-- column 3: UoA -->
  <g transform="translate(832, 256)">
    <text x="0" y="0" class="mono muted" font-size="10" font-weight="700" letter-spacing="2.5" fill="#64645F">FUNCTION 03  ·  THE APPLICATION</text>
    <text x="0" y="36" class="serif ink" font-size="22" font-weight="500" fill="#16181C">Unit of account</text>
    <text x="0" y="68" class="sans muted" font-size="13" fill="#64645F">
      <tspan x="0" dy="0">Denominates prices,</tspan>
      <tspan x="0" dy="18">wages and debt.</tspan>
    </text>
    <text x="0" y="124" class="mono muted" font-size="10" font-weight="500" letter-spacing="2" fill="#64645F">PROPERTIES</text>
    <text x="0" y="142" class="sans ink" font-size="12" fill="#16181C">Stable purchasing power · denom. depth · habit</text>
    <!-- status pill -->
    <g transform="translate(0, 168)">
      <rect x="0" y="0" width="6" height="6" transform="rotate(45 3 3)" class="gold" fill="#C8922A"/>
      <text x="16" y="9" class="mono ink" font-size="11" font-weight="700" letter-spacing="1.5" fill="#16181C">EMERGENT · MULTI-DECADE</text>
    </g>
  </g>

  <!-- ============ bottom: layered-stack mapping band ============ -->
  <!-- band background — slightly darker cream for contrast -->
  <rect x="0" y="466" width="1200" height="108" fill="#EDEDE8"/>
  <line x1="0" y1="466" x2="1200" y2="466" class="hairline-strong" stroke-width="1"/>

  <!-- band label -->
  <text x="64" y="492" class="mono muted" font-size="10" font-weight="700" letter-spacing="2.5" fill="#64645F">WHICH LAYER OF THE BITCOIN STACK SERVES EACH FUNCTION</text>

  <!-- column 1 stack: Bitcoin L1 -->
  <g transform="translate(64, 512)">
    <rect x="0" y="0" width="340" height="40" rx="2" fill="#16181C"/>
    <rect x="0" y="0" width="3" height="40" class="gold" fill="#C8922A"/>
    <text x="16" y="18" class="mono" font-size="11" font-weight="700" letter-spacing="1.5" fill="#F7F7F2">BITCOIN L1</text>
    <text x="16" y="33" class="sans" font-size="11" fill="#DADAD2">Neutral final settlement · unilateral exit</text>
  </g>

  <!-- column 2 stack: stacked thin bars for the three MoE rails -->
  <g transform="translate(448, 512)">
    <rect x="0" y="0" width="340" height="12" rx="1" fill="#16181C"/>
    <rect x="0" y="0" width="3" height="12" class="gold" fill="#C8922A"/>
    <text x="14" y="9" class="mono" font-size="9" font-weight="700" letter-spacing="1" fill="#F7F7F2">LIGHTNING (SELF-CUSTODIAL)  ·  CHANNEL EXIT TO L1</text>

    <rect x="0" y="14" width="340" height="12" rx="1" fill="#272930"/>
    <rect x="0" y="14" width="3" height="12" class="gold" fill="#C8922A"/>
    <text x="14" y="23" class="mono" font-size="9" font-weight="700" letter-spacing="1" fill="#F7F7F2">FEDIMINT  ·  COMMUNITY-SCALE CUSTODY + PRIVACY</text>

    <rect x="0" y="28" width="340" height="12" rx="1" fill="#3C3E45"/>
    <rect x="0" y="28" width="3" height="12" class="gold" fill="#C8922A"/>
    <text x="14" y="37" class="mono" font-size="9" font-weight="700" letter-spacing="1" fill="#F7F7F2">LIQUID + TAPROOT ASSETS + BOLTZ  ·  DOLLAR ACCESS</text>
  </g>

  <!-- column 3 stack: Stacks bridges + multi-decade -->
  <g transform="translate(832, 512)">
    <rect x="0" y="0" width="304" height="40" rx="2" fill="#F7F7F2" stroke="#16181C" stroke-width="1" stroke-dasharray="4 3"/>
    <rect x="0" y="0" width="3" height="40" class="gold" fill="#C8922A"/>
    <text x="16" y="18" class="mono ink" font-size="11" font-weight="700" letter-spacing="1.5" fill="#16181C">STACKS sBTC · BTC-DENOM. CREDIT</text>
    <text x="16" y="33" class="sans muted" font-size="10" fill="#64645F">Bridge function · UoA is downstream of merchant + wage adoption</text>
  </g>

  <!-- ============ footer ============ -->
  <line x1="64" y1="592" x2="1136" y2="592" class="hairline" stroke-width="1"/>
  <g transform="translate(64, 614)">
    <rect x="0" y="-8" width="7" height="7" transform="rotate(45 3.5 -4.5)" class="gold" fill="#C8922A"/>
    <text x="18" y="0" class="mono ink" font-size="10" font-weight="500" letter-spacing="1.5" fill="#16181C">CREATED BY DALIA  ·  BITCOINSOVEREIGN.ACADEMY</text>
  </g>
  <text x="1136" y="614" class="mono muted" font-size="10" font-weight="500" letter-spacing="1.5" text-anchor="end" fill="#64645F">ACTIVITY MOVES TO THE FASTEST RAIL  ·  TRUST MOVES TO THE HARDEST ASSET</text>
</svg>
