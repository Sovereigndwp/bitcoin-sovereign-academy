<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
<script>
(function () {
  'use strict';

  // Whitelist of canonical source documents (no path traversal, no arbitrary fetch).
  var DOCS = {
    'thesis-v4.md':                  'FOUNDATION · Thesis v4',
    'executive-tldr.md':             'SUMMARY · Executive TL;DR',
    'newcomer-onepager.md':          'PRIMER · Newcomer One-Pager',
    'field-guide.md':                'DETAIL · Field Guide',
    'counter-map.md':                'COMPETITORS · Counter-Map',
    'competing-theses.md':           'IDEOLOGY · Competing Theses',
    'quantum-scenario.md':           'SCENARIO · Quantum Scenario v4',
    'regulatory-deep-dive.md':       'REGULATION · Regulatory Deep-Dive v4',
    'falsification-framework-v4.md': 'FRAMEWORK · Falsification Framework v4',
    'disclosure-methodology.md':     'DISCLOSURE · Methodology & Disclosure'
  };
  // Docs that have a richer standalone HTML page: link there instead of the reader.
  var HTML_VERSIONS = {
    'executive-tldr.md': 'executive-tldr.html',
    'newcomer-onepager.md': 'newcomer-onepager.html'
  };

  var statusEl = document.getElementById('status');
  var contentEl = document.getElementById('content');
  var eyebrowEl = document.getElementById('eyebrow');
  var sourceEl = document.getElementById('source');

  function fail(msg, rawHref) {
    contentEl.innerHTML = '';
    var d = document.createElement('div');
    d.className = 'status err';
    d.textContent = msg + ' ';
    if (rawHref) {
      var a = document.createElement('a');
      a.href = rawHref; a.textContent = 'Open the raw markdown instead.';
      d.appendChild(a);
    }
    contentEl.appendChild(d);
  }

  // GitHub-style heading slugger so in-document anchors (e.g. #part-vii--...) resolve.
  function slug(text) {
    return String(text).trim().toLowerCase()
      .replace(/<[^>]+>/g, '')
      .replace(/[^\w\s-]/g, '')
      .replace(/\s/g, '-');
  }

  function pickDoc() {
    var param = new URLSearchParams(window.location.search).get('doc') || 'thesis-v4.md';
    // strip any path components for safety; match against whitelist only
    param = param.split('/').pop();
    return DOCS[param] ? param : null;
  }

  function rewriteLinks(root) {
    var as = root.querySelectorAll('a[href]');
    for (var i = 0; i < as.length; i++) {
      var raw = as[i].getAttribute('href') || '';
      if (/^(https?:)?\/\//.test(raw) || raw.indexOf('mailto:') === 0) {
        as[i].setAttribute('rel', 'noopener'); // external, leave as-is
        continue;
      }
      if (raw.charAt(0) === '#') continue; // in-page anchor
      // internal .md link (optionally with #hash) -> route to html version or the reader
      var m = raw.match(/^([^?#]*\.md)(#.*)?$/i);
      if (m) {
        var file = m[1].split('/').pop();
        var hash = m[2] || '';
        if (HTML_VERSIONS[file]) {
          as[i].setAttribute('href', HTML_VERSIONS[file] + hash);
        } else if (DOCS[file]) {
          as[i].setAttribute('href', 'reader.html?doc=' + file + hash);
        }
      }
    }
  }

  function addHeadingIds(root) {
    var hs = root.querySelectorAll('h1,h2,h3,h4,h5,h6');
    var seen = {};
    for (var i = 0; i < hs.length; i++) {
      if (hs[i].id) continue;
      var base = slug(hs[i].textContent);
      if (!base) continue;
      var id = base, n = 1;
      while (seen[id]) { id = base + '-' + n; n++; }
      seen[id] = true;
      hs[i].id = id;
    }
  }

  function scrollToHash() {
    if (!window.location.hash) return;
    var target = document.getElementById(window.location.hash.slice(1));
    if (target) target.scrollIntoView();
  }

  function render(docFile, text) {
    if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
      fail('The reader could not load.', docFile);
      return;
    }
    marked.setOptions({ gfm: true, breaks: false, headerIds: false, mangle: false });
    var dirty = marked.parse(text);
    var clean = DOMPurify.sanitize(dirty, { ADD_ATTR: ['target'] });
    contentEl.innerHTML = clean;
    addHeadingIds(contentEl);
    rewriteLinks(contentEl);
    // Title from first heading
    var h1 = contentEl.querySelector('h1');
    var label = DOCS[docFile];
    eyebrowEl.textContent = label.toUpperCase();
    if (h1) document.title = h1.textContent.trim() + ' — The Sovereign Academy';
    scrollToHash();
  }

  function boot() {
    var docFile = pickDoc();
    if (!docFile) {
      fail('That document is not part of this deep dive.', 'index.html');
      return;
    }
    sourceEl.innerHTML = 'Rendered from the canonical markdown source · ' +
      '<a href="' + docFile + '">view raw .md</a>';
    fetch(docFile, { cache: 'no-cache' })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function (text) { render(docFile, text); })
      .catch(function () { fail('Could not load this document.', docFile); });
  }

  // Re-render when navigating between docs via reader links (hash or query change).
  window.addEventListener('popstate', boot);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
