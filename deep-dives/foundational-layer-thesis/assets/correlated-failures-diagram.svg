<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bgCF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#141A22"/>
    </linearGradient>
    <radialGradient id="haloCF" cx="50%" cy="0%" r="55%">
      <stop offset="0%" stop-color="rgba(232,97,107,0.10)"/>
      <stop offset="100%" stop-color="rgba(232,97,107,0)"/>
    </radialGradient>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,1 L0,13 L12,7 z" fill="#E8616B" opacity="0.85"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgCF)"/>
  <rect width="1600" height="320" fill="url(#haloCF)"/>

  <!-- Header -->
  <text x="100" y="80" fill="#F7931A" font-size="14" font-weight="600" letter-spacing="3">THE SOVEREIGN ACADEMY · RESEARCH NOTE</text>
  <text x="100" y="135" fill="#F0EAE0" font-size="38" font-weight="700">Correlated Failures</text>
  <text x="100" y="170" fill="#B4BCC8" font-size="16">The 17 falsifiers are not independent. Four scenarios show how a single root cause cascades across multiple falsifiers.</text>

  <text x="1500" y="80" text-anchor="end" fill="#6C7684" font-size="11" font-weight="500" letter-spacing="2">FIG · CORRELATED FAILURES</text>
  <text x="1500" y="100" text-anchor="end" fill="#6C7684" font-size="11">v4 · May 2026</text>

  <!-- Four scenario boxes arranged in 2x2 grid -->
  <!-- Scenario 1: BTC Price Crash (top-left) -->
  <g>
    <rect x="60" y="230" width="720" height="340" rx="12" fill="#141A22" stroke="#E8616B" stroke-width="2"/>
    <text x="80" y="265" fill="#E8616B" font-size="11" font-weight="700" letter-spacing="3">SCENARIO 01</text>
    <text x="80" y="300" fill="#F0EAE0" font-size="22" font-weight="700">BTC Crash + Unrecovered Adoption</text>
    <text x="80" y="324" fill="#B4BCC8" font-size="13">v4: a price crash alone isn't thesis failure — Bitcoin has had multiple 50%+ drawdowns; the failure mode is crash + unrecovered metrics</text>

    <!-- Root cause -->
    <rect x="100" y="355" width="180" height="50" rx="8" fill="rgba(232,97,107,0.15)" stroke="#E8616B" stroke-width="1.5"/>
    <text x="190" y="377" text-anchor="middle" fill="#E8616B" font-size="12" font-weight="700">ROOT</text>
    <text x="190" y="394" text-anchor="middle" fill="#F0EAE0" font-size="11">Crash + failed recovery</text>

    <!-- Cascading falsifier boxes -->
    <g font-size="11" fill="#F0EAE0">
      <rect x="320" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#E8616B"/>
      <text x="360" y="365" text-anchor="middle" fill="#E8616B" font-weight="700">F2</text>
      <line x1="280" y1="380" x2="320" y2="362" stroke="#E8616B" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="420" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#E8616B"/>
      <text x="460" y="365" text-anchor="middle" fill="#E8616B" font-weight="700">F3</text>
      <line x1="280" y1="380" x2="420" y2="362" stroke="#E8616B" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="520" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#E8616B"/>
      <text x="560" y="365" text-anchor="middle" fill="#E8616B" font-weight="700">F4</text>
      <line x1="280" y1="380" x2="520" y2="362" stroke="#E8616B" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="620" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#E8616B"/>
      <text x="660" y="365" text-anchor="middle" fill="#E8616B" font-weight="700">F11</text>
      <line x1="280" y1="380" x2="620" y2="362" stroke="#E8616B" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="420" y="395" width="80" height="32" rx="5" fill="#1D2530" stroke="#E8616B"/>
      <text x="460" y="415" text-anchor="middle" fill="#E8616B" font-weight="700">F16</text>
      <line x1="280" y1="395" x2="420" y2="412" stroke="#E8616B" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>
    </g>

    <text x="80" y="465" fill="#FFC857" font-size="11" font-weight="700" letter-spacing="2">FIRED COUNT</text>
    <text x="80" y="488" fill="#F0EAE0" font-size="15" font-weight="700">5 of 17 falsifiers</text>
    <text x="80" y="510" fill="#FFC857" font-size="11">Partial-intact verdict (5 fired); one short of rejection.</text>

    <text x="80" y="540" fill="#7BD389" font-size="11" font-weight="700" letter-spacing="2">RECOVERABILITY</text>
    <text x="80" y="560" fill="#F0EAE0" font-size="11">High. Most impacts revert with price recovery.</text>
  </g>

  <!-- Scenario 2: Tether Action (top-right) -->
  <g>
    <rect x="820" y="230" width="720" height="340" rx="12" fill="#141A22" stroke="#FFC857" stroke-width="2"/>
    <text x="840" y="265" fill="#FFC857" font-size="11" font-weight="700" letter-spacing="3">SCENARIO 02</text>
    <text x="840" y="300" fill="#F0EAE0" font-size="22" font-weight="700">Tether Enforcement</text>
    <text x="840" y="324" fill="#B4BCC8" font-size="13">US Treasury or EU regulator — stablecoin cascade</text>

    <rect x="860" y="355" width="180" height="50" rx="8" fill="rgba(255,200,87,0.15)" stroke="#FFC857" stroke-width="1.5"/>
    <text x="950" y="377" text-anchor="middle" fill="#FFC857" font-size="12" font-weight="700">ROOT</text>
    <text x="950" y="394" text-anchor="middle" fill="#F0EAE0" font-size="11">Tether action</text>

    <g font-size="11" fill="#F0EAE0">
      <rect x="1080" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857"/>
      <text x="1120" y="365" text-anchor="middle" fill="#FFC857" font-weight="700">F3</text>
      <line x1="1040" y1="380" x2="1080" y2="362" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="1180" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857"/>
      <text x="1220" y="365" text-anchor="middle" fill="#FFC857" font-weight="700">F7</text>
      <line x1="1040" y1="380" x2="1180" y2="362" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="1280" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857"/>
      <text x="1320" y="365" text-anchor="middle" fill="#FFC857" font-weight="700">F10</text>
      <line x1="1040" y1="380" x2="1280" y2="362" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="1380" y="345" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857" stroke-dasharray="2,2"/>
      <text x="1420" y="365" text-anchor="middle" fill="#FFC857" font-weight="700">F13?</text>
      <line x1="1040" y1="380" x2="1380" y2="362" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>
    </g>

    <text x="840" y="445" fill="#FFC857" font-size="11" font-weight="700" letter-spacing="2">FIRED COUNT</text>
    <text x="840" y="468" fill="#F0EAE0" font-size="15" font-weight="700">3–4 of 17 falsifiers</text>
    <text x="840" y="490" fill="#FFC857" font-size="11">Below rejection threshold. USDC + ctUSD pick up role.</text>

    <text x="840" y="520" fill="#7BD389" font-size="11" font-weight="700" letter-spacing="2">RECOVERABILITY</text>
    <text x="840" y="540" fill="#F0EAE0" font-size="11">Medium. 12–24mo reorg of L4 fiat bridge layer.</text>
  </g>

  <!-- Scenario 3: Atomic-swap regulatory crackdown (bottom-left) -->
  <g>
    <rect x="60" y="610" width="720" height="320" rx="12" fill="#141A22" stroke="#FFC857" stroke-width="2"/>
    <text x="80" y="645" fill="#FFC857" font-size="11" font-weight="700" letter-spacing="3">SCENARIO 03</text>
    <text x="80" y="680" fill="#F0EAE0" font-size="22" font-weight="700">Privacy-Tool Enforcement Risk</text>
    <text x="80" y="704" fill="#B4BCC8" font-size="13">Multi-vector Tornado-Cash template — operators, frontends, developers, infrastructure, liquidity providers</text>

    <rect x="100" y="735" width="180" height="50" rx="8" fill="rgba(255,200,87,0.15)" stroke="#FFC857" stroke-width="1.5"/>
    <text x="190" y="757" text-anchor="middle" fill="#FFC857" font-size="12" font-weight="700">ROOT</text>
    <text x="190" y="774" text-anchor="middle" fill="#F0EAE0" font-size="11">Reg action</text>

    <g font-size="11" fill="#F0EAE0">
      <rect x="320" y="725" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857"/>
      <text x="360" y="745" text-anchor="middle" fill="#FFC857" font-weight="700">F10</text>
      <line x1="280" y1="760" x2="320" y2="742" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="420" y="725" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857"/>
      <text x="460" y="745" text-anchor="middle" fill="#FFC857" font-weight="700">F3</text>
      <line x1="280" y1="760" x2="420" y2="742" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="520" y="725" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857" stroke-dasharray="2,2"/>
      <text x="560" y="745" text-anchor="middle" fill="#FFC857" font-weight="700">F2?</text>
      <line x1="280" y1="760" x2="520" y2="742" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>
    </g>

    <text x="80" y="820" fill="#FFC857" font-size="11" font-weight="700" letter-spacing="2">FIRED COUNT</text>
    <text x="80" y="843" fill="#F0EAE0" font-size="15" font-weight="700">2–3 of 17 falsifiers</text>
    <text x="80" y="865" fill="#FFC857" font-size="11">Below threshold. Self-custodial / Fedimint paths more relevant.</text>

    <text x="80" y="895" fill="#7BD389" font-size="11" font-weight="700" letter-spacing="2">RECOVERABILITY</text>
    <text x="80" y="915" fill="#F0EAE0" font-size="11">High. Operators emerge in friendlier jurisdictions.</text>
  </g>

  <!-- Scenario 4: ETF custody event (bottom-right) -->
  <g>
    <rect x="820" y="610" width="720" height="320" rx="12" fill="#141A22" stroke="#FFC857" stroke-width="2"/>
    <text x="840" y="645" fill="#FFC857" font-size="11" font-weight="700" letter-spacing="3">SCENARIO 04</text>
    <text x="840" y="680" fill="#F0EAE0" font-size="22" font-weight="700">ETF Custody Event</text>
    <text x="840" y="704" fill="#B4BCC8" font-size="13">Coinbase Custody disruption spillover to IBIT, GBTC, others</text>

    <rect x="860" y="735" width="180" height="50" rx="8" fill="rgba(255,200,87,0.15)" stroke="#FFC857" stroke-width="1.5"/>
    <text x="950" y="757" text-anchor="middle" fill="#FFC857" font-size="12" font-weight="700">ROOT</text>
    <text x="950" y="774" text-anchor="middle" fill="#F0EAE0" font-size="11">Custody event</text>

    <g font-size="11" fill="#F0EAE0">
      <rect x="1080" y="725" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857"/>
      <text x="1120" y="745" text-anchor="middle" fill="#FFC857" font-weight="700">F8</text>
      <line x1="1040" y1="760" x2="1080" y2="742" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="1180" y="725" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857"/>
      <text x="1220" y="745" text-anchor="middle" fill="#FFC857" font-weight="700">F10</text>
      <line x1="1040" y1="760" x2="1180" y2="742" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

      <rect x="1280" y="725" width="80" height="32" rx="5" fill="#1D2530" stroke="#FFC857" stroke-dasharray="2,2"/>
      <text x="1320" y="745" text-anchor="middle" fill="#FFC857" font-weight="700">F1?</text>
      <line x1="1040" y1="760" x2="1280" y2="742" stroke="#FFC857" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>
    </g>

    <text x="840" y="820" fill="#FFC857" font-size="11" font-weight="700" letter-spacing="2">FIRED COUNT</text>
    <text x="840" y="843" fill="#F0EAE0" font-size="15" font-weight="700">2–3 + narrative damage</text>
    <text x="840" y="865" fill="#FFC857" font-size="11">Direct fires below threshold; reputational risk substantial.</text>

    <text x="840" y="895" fill="#7BD389" font-size="11" font-weight="700" letter-spacing="2">RECOVERABILITY</text>
    <text x="840" y="915" fill="#F0EAE0" font-size="11">Medium. ETF re-architecture toward multi-custodian.</text>
  </g>

  <!-- Bottom legend / key (v4) -->
  <rect x="60" y="960" width="1480" height="30" rx="6" fill="#141A22" stroke="#3D4856" stroke-width="1"/>
  <text x="80" y="980" fill="#B4BCC8" font-size="11">v4 verdict rubric (unchanged from v3): 0–4 fired = intact · 5 fired = partial · 6+ fired = rejected · F17 firing alone = rejected (unilateral). Correlated fires recoverable via root-cause repair; independent fires usually not. Each quarterly review distinguishes which kind.</text>
</svg>
