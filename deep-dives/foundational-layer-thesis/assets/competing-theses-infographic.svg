<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#141A22"/>
    </linearGradient>
    <radialGradient id="haloC" cx="50%" cy="0%" r="55%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.12)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bgC)"/>
  <rect width="1600" height="380" fill="url(#haloC)"/>

  <!-- Header -->
  <text x="100" y="80" fill="#F7931A" font-size="14" font-weight="600" letter-spacing="3">THE SOVEREIGN ACADEMY · RESEARCH NOTE</text>
  <text x="100" y="135" fill="#F0EAE0" font-size="42" font-weight="700">Four Bitcoin Theses</text>
  <text x="100" y="170" fill="#B4BCC8" font-size="17">Where the Symbiotic-Sovereign Thesis disagrees with the three strongest competing positions.</text>

  <text x="1500" y="80" text-anchor="end" fill="#6C7684" font-size="11" font-weight="500" letter-spacing="2">FIG · COMPETING THESES</text>
  <text x="1500" y="100" text-anchor="end" fill="#6C7684" font-size="11">v4 · May 2026</text>

  <!-- 4 columns of thesis cards -->
  <!-- Column 1: Symbiotic-Sovereign (THIS THESIS) -->
  <g>
    <rect x="50" y="230" width="360" height="900" rx="14" fill="rgba(247,147,26,0.08)" stroke="#F7931A" stroke-width="2.5"/>
    <text x="70" y="270" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="3">THIS THESIS</text>
    <text x="70" y="305" fill="#F0EAE0" font-size="22" font-weight="700">Symbiotic-</text>
    <text x="70" y="335" fill="#F0EAE0" font-size="22" font-weight="700">Sovereign</text>

    <text x="70" y="380" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">CORE CLAIM</text>
    <text x="70" y="402" fill="#F0EAE0" font-size="12">Bitcoin wins SoV; stack</text>
    <text x="70" y="418" fill="#F0EAE0" font-size="12">absorbs 3 of 9 fronts;</text>
    <text x="70" y="434" fill="#F0EAE0" font-size="12">connects symbiotically</text>
    <text x="70" y="450" fill="#F0EAE0" font-size="12">to the other 6.</text>

    <text x="70" y="490" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">VOICES</text>
    <text x="70" y="512" fill="#F0EAE0" font-size="12">The Sovereign Academy.</text>
    <text x="70" y="528" fill="#F0EAE0" font-size="12">Architecture-level</text>
    <text x="70" y="544" fill="#F0EAE0" font-size="12">analyst position.</text>

    <text x="70" y="584" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">STABLECOINS</text>
    <text x="70" y="606" fill="#F0EAE0" font-size="12">Custody-spine pattern:</text>
    <text x="70" y="622" fill="#F0EAE0" font-size="12">USDT/USDC on Bitcoin</text>
    <text x="70" y="638" fill="#F0EAE0" font-size="12">rails. Dollar access,</text>
    <text x="70" y="654" fill="#F0EAE0" font-size="12">not dollar sovereignty.</text>

    <text x="70" y="694" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">ETFS</text>
    <text x="70" y="716" fill="#F0EAE0" font-size="12">Structural reality +</text>
    <text x="70" y="732" fill="#F0EAE0" font-size="12">centralization risk to</text>
    <text x="70" y="748" fill="#F0EAE0" font-size="12">track via F8 + F10.</text>

    <text x="70" y="788" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">LIGHTNING / L2</text>
    <text x="70" y="810" fill="#F0EAE0" font-size="12">Critical MoE surface.</text>
    <text x="70" y="826" fill="#F0EAE0" font-size="12">Both custodial and</text>
    <text x="70" y="842" fill="#F0EAE0" font-size="12">self-custodial paths.</text>

    <text x="70" y="882" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">OTHER CHAINS</text>
    <text x="70" y="904" fill="#F0EAE0" font-size="12">5-front Counter-Map:</text>
    <text x="70" y="920" fill="#F0EAE0" font-size="12">Tron, Base, TON, Solana,</text>
    <text x="70" y="936" fill="#F0EAE0" font-size="12">Hyperliquid. Activity may</text>
    <text x="70" y="952" fill="#F0EAE0" font-size="12">route around Bitcoin.</text>

    <text x="70" y="992" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">5-YR PREDICTION</text>
    <text x="70" y="1014" fill="#F0EAE0" font-size="12">3 of 9 fronts won.</text>
    <text x="70" y="1030" fill="#F0EAE0" font-size="12">6 ceded. 17 falsifiers.</text>

    <text x="70" y="1070" fill="#FFA94D" font-size="11" font-weight="700" letter-spacing="2">KEY RISK</text>
    <text x="70" y="1092" fill="#F0EAE0" font-size="12">Correlated failure of</text>
    <text x="70" y="1108" fill="#F0EAE0" font-size="12">5+ falsifiers; quantum.</text>
  </g>

  <!-- Column 2: Cypherpunk Maximalist -->
  <g>
    <rect x="430" y="230" width="360" height="900" rx="14" fill="#141A22" stroke="#5BA3FF" stroke-width="1.5"/>
    <text x="450" y="270" fill="#5BA3FF" font-size="11" font-weight="700" letter-spacing="3">COMPETING · 01</text>
    <text x="450" y="305" fill="#F0EAE0" font-size="22" font-weight="700">Cypherpunk</text>
    <text x="450" y="335" fill="#F0EAE0" font-size="22" font-weight="700">Maximalist</text>

    <text x="450" y="380" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">CORE CLAIM</text>
    <text x="450" y="402" fill="#F0EAE0" font-size="12">Bitcoin is sovereign</text>
    <text x="450" y="418" fill="#F0EAE0" font-size="12">electronic cash. Reject</text>
    <text x="450" y="434" fill="#F0EAE0" font-size="12">all custodial layers,</text>
    <text x="450" y="450" fill="#F0EAE0" font-size="12">all stablecoins, all</text>
    <text x="450" y="466" fill="#F0EAE0" font-size="12">corporate onboarding.</text>

    <text x="450" y="506" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">REPRESENTATIVE VIEW</text>
    <text x="450" y="528" fill="#F0EAE0" font-size="12">Long-running cypherpunk</text>
    <text x="450" y="544" fill="#F0EAE0" font-size="12">community position; widely</text>
    <text x="450" y="560" fill="#F0EAE0" font-size="12">represented in Bitcoin media.</text>

    <text x="450" y="600" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">STABLECOINS</text>
    <text x="450" y="622" fill="#F0EAE0" font-size="12">Anti-Bitcoin betrayal.</text>
    <text x="450" y="638" fill="#F0EAE0" font-size="12">Tether is exactly what</text>
    <text x="450" y="654" fill="#F0EAE0" font-size="12">Bitcoin was meant to</text>
    <text x="450" y="670" fill="#F0EAE0" font-size="12">obsolete.</text>

    <text x="450" y="710" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">ETFS</text>
    <text x="450" y="732" fill="#F0EAE0" font-size="12">Wall Street capture.</text>
    <text x="450" y="748" fill="#F0EAE0" font-size="12">Bitcoin theater. Not</text>
    <text x="450" y="764" fill="#F0EAE0" font-size="12">Bitcoin in monetary sense.</text>

    <text x="450" y="804" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">LIGHTNING / L2</text>
    <text x="450" y="826" fill="#F0EAE0" font-size="12">Only if non-custodial.</text>
    <text x="450" y="842" fill="#F0EAE0" font-size="12">Custodial LN is just a</text>
    <text x="450" y="858" fill="#F0EAE0" font-size="12">faster Coinbase.</text>

    <text x="450" y="898" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">OTHER CHAINS</text>
    <text x="450" y="920" fill="#F0EAE0" font-size="12">Distraction or threat.</text>
    <text x="450" y="936" fill="#F0EAE0" font-size="12">Not legitimate competition;</text>
    <text x="450" y="952" fill="#F0EAE0" font-size="12">not legitimate plug-in.</text>

    <text x="450" y="992" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">5-YR PREDICTION</text>
    <text x="450" y="1014" fill="#F0EAE0" font-size="12">Bitcoin stays sovereign</text>
    <text x="450" y="1030" fill="#F0EAE0" font-size="12">or loses everything.</text>

    <text x="450" y="1070" fill="#8FBEFF" font-size="11" font-weight="700" letter-spacing="2">KEY RISK</text>
    <text x="450" y="1092" fill="#F0EAE0" font-size="12">Sovereignty erosion via</text>
    <text x="450" y="1108" fill="#F0EAE0" font-size="12">convenience.</text>
  </g>

  <!-- Column 3: Institutional SoV -->
  <g>
    <rect x="810" y="230" width="360" height="900" rx="14" fill="#141A22" stroke="#B084FF" stroke-width="1.5"/>
    <text x="830" y="270" fill="#B084FF" font-size="11" font-weight="700" letter-spacing="3">COMPETING · 02</text>
    <text x="830" y="305" fill="#F0EAE0" font-size="22" font-weight="700">Institutional</text>
    <text x="830" y="335" fill="#F0EAE0" font-size="22" font-weight="700">Store-of-Value</text>

    <text x="830" y="380" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">CORE CLAIM</text>
    <text x="830" y="402" fill="#F0EAE0" font-size="12">Bitcoin is digital gold.</text>
    <text x="830" y="418" fill="#F0EAE0" font-size="12">L2 / payments are a</text>
    <text x="830" y="434" fill="#F0EAE0" font-size="12">distraction. ETF + treasury</text>
    <text x="830" y="450" fill="#F0EAE0" font-size="12">adoption is the story.</text>

    <text x="830" y="490" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">REPRESENTATIVE VIEW</text>
    <text x="830" y="512" fill="#F0EAE0" font-size="12">Public-company treasury</text>
    <text x="830" y="528" fill="#F0EAE0" font-size="12">positions, large-asset-manager</text>
    <text x="830" y="544" fill="#F0EAE0" font-size="12">ETF and allocator framing.</text>

    <text x="830" y="584" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">STABLECOINS</text>
    <text x="830" y="606" fill="#F0EAE0" font-size="12">Side quest. Doesn't</text>
    <text x="830" y="622" fill="#F0EAE0" font-size="12">affect Bitcoin's value</text>
    <text x="830" y="638" fill="#F0EAE0" font-size="12">capture story.</text>

    <text x="830" y="678" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">ETFS</text>
    <text x="830" y="700" fill="#F0EAE0" font-size="12">The adoption story.</text>
    <text x="830" y="716" fill="#F0EAE0" font-size="12">IBIT $54B, FBTC $17B,</text>
    <text x="830" y="732" fill="#F0EAE0" font-size="12">GBTC $15B = institutional</text>
    <text x="830" y="748" fill="#F0EAE0" font-size="12">maturity, not centralization.</text>

    <text x="830" y="788" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">LIGHTNING / L2</text>
    <text x="830" y="810" fill="#F0EAE0" font-size="12">Side quest. Affects &lt; 5%</text>
    <text x="830" y="826" fill="#F0EAE0" font-size="12">of value capture.</text>

    <text x="830" y="866" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">OTHER CHAINS</text>
    <text x="830" y="888" fill="#F0EAE0" font-size="12">Irrelevant. Different</text>
    <text x="830" y="904" fill="#F0EAE0" font-size="12">asset class.</text>

    <text x="830" y="944" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">5-YR PREDICTION</text>
    <text x="830" y="966" fill="#F0EAE0" font-size="12">Price + AUM continue</text>
    <text x="830" y="982" fill="#F0EAE0" font-size="12">to grow. Bitcoin captures</text>
    <text x="830" y="998" fill="#F0EAE0" font-size="12">share from gold &amp; bonds.</text>

    <text x="830" y="1038" fill="#C9A8FF" font-size="11" font-weight="700" letter-spacing="2">KEY RISK</text>
    <text x="830" y="1060" fill="#F0EAE0" font-size="12">Custody concentration</text>
    <text x="830" y="1076" fill="#F0EAE0" font-size="12">event at Coinbase or</text>
    <text x="830" y="1092" fill="#F0EAE0" font-size="12">other qualified custodian.</text>
  </g>

  <!-- Column 4: Bitcoin-Will-Fail -->
  <g>
    <rect x="1190" y="230" width="360" height="900" rx="14" fill="#141A22" stroke="#E8616B" stroke-width="1.5"/>
    <text x="1210" y="270" fill="#E8616B" font-size="11" font-weight="700" letter-spacing="3">COMPETING · 03</text>
    <text x="1210" y="305" fill="#F0EAE0" font-size="22" font-weight="700">Bitcoin-Will-</text>
    <text x="1210" y="335" fill="#F0EAE0" font-size="22" font-weight="700">Fail</text>

    <text x="1210" y="380" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">CORE CLAIM</text>
    <text x="1210" y="402" fill="#F0EAE0" font-size="12">17-year bubble. Fails on</text>
    <text x="1210" y="418" fill="#F0EAE0" font-size="12">security budget math,</text>
    <text x="1210" y="434" fill="#F0EAE0" font-size="12">energy politics, and/or</text>
    <text x="1210" y="450" fill="#F0EAE0" font-size="12">regulatory capture.</text>

    <text x="1210" y="490" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">REPRESENTATIVE VIEW</text>
    <text x="1210" y="512" fill="#F0EAE0" font-size="12">Mainstream macro skepticism;</text>
    <text x="1210" y="528" fill="#F0EAE0" font-size="12">academic finance bubble</text>
    <text x="1210" y="544" fill="#F0EAE0" font-size="12">framing; technical security-</text>
    <text x="1210" y="560" fill="#F0EAE0" font-size="12">budget critique.</text>

    <text x="1210" y="600" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">STABLECOINS</text>
    <text x="1210" y="622" fill="#F0EAE0" font-size="12">Doesn't change Bitcoin's</text>
    <text x="1210" y="638" fill="#F0EAE0" font-size="12">failure trajectory.</text>

    <text x="1210" y="678" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">ETFS</text>
    <text x="1210" y="700" fill="#F0EAE0" font-size="12">Concentrate the eventual</text>
    <text x="1210" y="716" fill="#F0EAE0" font-size="12">failure point. Wall Street</text>
    <text x="1210" y="732" fill="#F0EAE0" font-size="12">bag holders.</text>

    <text x="1210" y="772" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">LIGHTNING / L2</text>
    <text x="1210" y="794" fill="#F0EAE0" font-size="12">Doesn't solve volatility.</text>
    <text x="1210" y="810" fill="#F0EAE0" font-size="12">Doesn't solve security</text>
    <text x="1210" y="826" fill="#F0EAE0" font-size="12">budget. Not enough.</text>

    <text x="1210" y="866" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">OTHER CHAINS</text>
    <text x="1210" y="888" fill="#F0EAE0" font-size="12">Symptoms of the same</text>
    <text x="1210" y="904" fill="#F0EAE0" font-size="12">speculative bubble.</text>

    <text x="1210" y="944" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">5-YR PREDICTION</text>
    <text x="1210" y="966" fill="#F0EAE0" font-size="12">Eventual collapse begins.</text>
    <text x="1210" y="982" fill="#F0EAE0" font-size="12">Bubble framing from</text>
    <text x="1210" y="998" fill="#F0EAE0" font-size="12">academic finance critics.</text>

    <text x="1210" y="1038" fill="#F8989E" font-size="11" font-weight="700" letter-spacing="2">KEY REFUTATION</text>
    <text x="1210" y="1060" fill="#F0EAE0" font-size="12">If Bitcoin's monetary</text>
    <text x="1210" y="1076" fill="#F0EAE0" font-size="12">properties hold AND fees</text>
    <text x="1210" y="1092" fill="#F0EAE0" font-size="12">sustain miners post-2028.</text>
  </g>

  <!-- Bottom callout -->
  <rect x="50" y="1150" width="1500" height="30" rx="6" fill="#141A22" stroke="#3D4856" stroke-width="1"/>
  <text x="70" y="1170" fill="#B4BCC8" font-size="11">The SST occupies the analytical middle ground. It is most exposed to being wrong in multiple directions — which is what falsifiability frameworks are for.</text>
</svg>
