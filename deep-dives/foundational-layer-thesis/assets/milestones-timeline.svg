    <circle cx="10" cy="22" r="6" fill="#F7931A"/>
    <text x="24" y="26" fill="#F0EAE0" font-size="11">L0 · Base</text>

    <circle cx="110" cy="22" r="6" fill="#FFA94D"/>
    <text x="124" y="26" fill="#F0EAE0" font-size="11">L1 · Assets</text>

    <circle cx="220" cy="22" r="6" fill="#5BA3FF"/>
    <text x="234" y="26" fill="#F0EAE0" font-size="11">L2 · Payments</text>

    <circle cx="345" cy="22" r="6" fill="#8FBEFF"/>
    <text x="359" y="26" fill="#F0EAE0" font-size="11">L2.5 · Federations</text>

    <circle cx="495" cy="22" r="6" fill="#B084FF"/>
    <text x="509" y="26" fill="#F0EAE0" font-size="11">L3 · Programmability</text>

    <circle cx="665" cy="22" r="6" fill="#C9A8FF"/>
    <text x="679" y="26" fill="#F0EAE0" font-size="11">L4 · Fiat bridge</text>
