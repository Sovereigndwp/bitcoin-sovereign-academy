  <text x="100" y="128" fill="#F0EAE0" font-size="38" font-weight="700">The Bitcoin Stack, 2024 — 2026</text>
  <text x="100" y="160" fill="#B4BCC8" font-size="16">Two years of stack maturation: from sBTC and Nakamoto to USDT on Lightning, ZK-rollups, and non-custodial dollar swaps.</text>

  <text x="1700" y="80" text-anchor="end" fill="#6C7684" font-size="11" font-weight="500" letter-spacing="2">FIG · 03</text>
  <text x="1700" y="100" text-anchor="end" fill="#6C7684" font-size="11">Milestones timeline</text>

