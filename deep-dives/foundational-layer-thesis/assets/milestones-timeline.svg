      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#141A22"/>
    </linearGradient>
    <radialGradient id="tlHalo" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.14)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
    <linearGradient id="axisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.4)"/>
      <stop offset="50%" stop-color="rgba(247,147,26,1)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0.4)"/>
