  <!-- Settlement flow arrow (v4: 'trust flows down' overstates what most layers actually inherit) -->
  <g>
    <line x1="1360" y1="260" x2="1360" y2="890" stroke="#F7931A" stroke-width="2" marker-end="url(#arrowOrange)" opacity="0.7"/>
    <text x="1382" y="500" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="2" transform="rotate(90 1382 500)">FINAL SETTLEMENT FLOWS TO BITCOIN — WHERE EXIT RIGHTS ARE REAL</text>
  </g>

  <!-- Asset-row trust-model note (v4 audit) -->
  <g>
    <text x="280" y="934" fill="#6C7684" font-size="10" font-style="italic">v4 audit: each row above adds its own trust assumptions on top of Bitcoin L1 — federations, signer sets, operators, issuers, bridges. Bitcoin guarantees L0 settlement; higher layers add capability and new trust.</text>
  </g>

  <!-- Doctrine band (v4 softened — 'absorption' replaced with 'symbiotic connection') -->
  <g>
    <rect x="40" y="950" width="1320" height="56" rx="10" fill="#141A22" stroke="#F7931A" stroke-width="1"/>
    <text x="60" y="975" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="2">THE SYMBIOTIC-SOVEREIGN DOCTRINE (v4)</text>
    <text x="60" y="996" fill="#F0EAE0" font-size="12">L1 stays conservative · Higher functions live above with their own trust models · Bitcoin connects to external liquidity rather than replicating it · Activity moves to the fastest rail; trust moves to the hardest asset · The stack wins where the asset matters, connects where rails matter</text>
  </g>
