<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="qBgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
    <radialGradient id="qHaloB" cx="50%" cy="0%" r="65%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.28)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#qBgB)"/>
  <rect width="1080" height="1080" fill="url(#qHaloB)"/>

  <!-- Eyebrow -->
  <text x="540" y="130" text-anchor="middle" fill="#F7931A" font-size="13" font-weight="600" letter-spacing="4">THE SOVEREIGN ACADEMY</text>
  <rect x="490" y="148" width="100" height="2" fill="#F7931A"/>

  <!-- Open quote -->
  <text x="540" y="320" text-anchor="middle" fill="#F7931A" font-size="160" font-weight="700" opacity="0.35">"</text>

  <!-- Quote -->
  <text x="540" y="430" text-anchor="middle" fill="#F0EAE0" font-size="44" font-weight="700">Bitcoin doesn't need</text>
  <text x="540" y="486" text-anchor="middle" fill="#F0EAE0" font-size="44" font-weight="700">to compete with</text>
  <text x="540" y="542" text-anchor="middle" fill="#F0EAE0" font-size="44" font-weight="700">other blockchains.</text>

  <rect x="490" y="592" width="100" height="2" fill="#F7931A" opacity="0.7"/>

  <text x="540" y="660" text-anchor="middle" fill="#F7931A" font-size="44" font-weight="700">It needs to absorb</text>
  <text x="540" y="716" text-anchor="middle" fill="#F7931A" font-size="44" font-weight="700">their best capabilities</text>
  <text x="540" y="772" text-anchor="middle" fill="#F7931A" font-size="44" font-weight="700">into a stack it controls.</text>

  <!-- Footer -->
  <rect x="490" y="930" width="100" height="2" fill="#F7931A"/>
  <text x="540" y="976" text-anchor="middle" fill="#B4BCC8" font-size="15" font-weight="500">From: Bitcoin Is No Longer Just the Foundational Layer</text>
  <text x="540" y="1004" text-anchor="middle" fill="#6C7684" font-size="13">thesovereign.academy · May 2026</text>
</svg>
