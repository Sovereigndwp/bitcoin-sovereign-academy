<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="qBgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
    <radialGradient id="qHaloA" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.32)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#qBgA)"/>
  <rect width="1200" height="630" fill="url(#qHaloA)"/>

  <!-- Eyebrow -->
  <text x="80" y="90" fill="#F7931A" font-size="13" font-weight="600" letter-spacing="4">THE SOVEREIGN ACADEMY · RESEARCH NOTE</text>
  <rect x="80" y="105" width="100" height="2" fill="#F7931A"/>

  <!-- Open quote mark -->
  <text x="80" y="270" fill="#F7931A" font-size="120" font-weight="700" opacity="0.4">"</text>

  <!-- Quote -->
  <text x="80" y="290" fill="#F0EAE0" font-size="32" font-weight="700">Bitcoin doesn't need to compete</text>
  <text x="80" y="332" fill="#F0EAE0" font-size="32" font-weight="700">with other blockchains.</text>
  <text x="80" y="394" fill="#F7931A" font-size="32" font-weight="700">It needs to absorb their best</text>
  <text x="80" y="436" fill="#F7931A" font-size="32" font-weight="700">capabilities into a stack it controls.</text>

  <!-- Footer -->
  <rect x="80" y="510" width="60" height="2" fill="#F7931A"/>
  <text x="80" y="546" fill="#B4BCC8" font-size="13" font-weight="500">From: Bitcoin Is No Longer Just the Foundational Layer</text>
  <text x="80" y="568" fill="#6C7684" font-size="11">thesovereign.academy · May 2026</text>
</svg>
