<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="qBgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#141A22"/>
    </linearGradient>
    <radialGradient id="qHaloC" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.12)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#qBgC)"/>
  <rect width="1080" height="1080" fill="url(#qHaloC)"/>

  <!-- Eyebrow -->
  <text x="540" y="130" text-anchor="middle" fill="#F7931A" font-size="13" font-weight="600" letter-spacing="4">THE ORDER OF MONEY</text>
  <rect x="490" y="148" width="100" height="2" fill="#F7931A"/>

  <!-- Three function blocks stacked -->
  <g transform="translate(140, 280)">
    <!-- SoV -->
    <rect x="0" y="0" width="800" height="160" rx="14" fill="rgba(247,147,26,0.10)" stroke="#F7931A" stroke-width="2"/>
    <text x="40" y="44" fill="#F7931A" font-size="12" font-weight="700" letter-spacing="3">FUNCTION 01 · DONE</text>
    <text x="40" y="90" fill="#F0EAE0" font-size="44" font-weight="700">Store of Value</text>
    <text x="40" y="130" fill="#B4BCC8" font-size="17">First. The hardest, and Bitcoin already won it.</text>

    <!-- MoE -->
    <rect x="0" y="180" width="800" height="160" rx="14" fill="rgba(91,163,255,0.10)" stroke="#5BA3FF" stroke-width="2"/>
    <text x="40" y="224" fill="#5BA3FF" font-size="12" font-weight="700" letter-spacing="3">FUNCTION 02 · BUILDING</text>
    <text x="40" y="270" fill="#F0EAE0" font-size="44" font-weight="700">Medium of Exchange</text>
    <text x="40" y="310" fill="#B4BCC8" font-size="17">Next. Lightning, Ark, Spark, USDT on Bitcoin rails.</text>

    <!-- UoA -->
    <rect x="0" y="360" width="800" height="160" rx="14" fill="rgba(176,132,255,0.10)" stroke="#B084FF" stroke-width="2"/>
    <text x="40" y="404" fill="#B084FF" font-size="12" font-weight="700" letter-spacing="3">FUNCTION 03 · EMERGENT</text>
    <text x="40" y="450" fill="#F0EAE0" font-size="44" font-weight="700">Unit of Account</text>
    <text x="40" y="490" fill="#B4BCC8" font-size="17">Last. Cannot be engineered, only earned.</text>
  </g>

  <!-- Footer -->
  <rect x="490" y="930" width="100" height="2" fill="#F7931A"/>
  <text x="540" y="976" text-anchor="middle" fill="#B4BCC8" font-size="15" font-weight="500">Sequential, not parallel. The ordering is the thesis.</text>
  <text x="540" y="1004" text-anchor="middle" fill="#6C7684" font-size="13">thesovereign.academy · May 2026</text>
</svg>
