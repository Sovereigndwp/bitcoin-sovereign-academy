<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="qBgE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#141A22"/>
    </linearGradient>
    <radialGradient id="qHaloE1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(176,132,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(176,132,255,0)"/>
    </radialGradient>
    <radialGradient id="qHaloE2" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.22)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
    <marker id="arrowIn" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,1 L0,13 L12,7 z" fill="#B084FF"/>
    </marker>
    <marker id="arrowOut" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,1 L0,13 L12,7 z" fill="#F7931A"/>
    </marker>
  </defs>
  <rect width="1080" height="1080" fill="url(#qBgE)"/>
  <rect width="1080" height="1080" fill="url(#qHaloE1)"/>
  <rect width="1080" height="1080" fill="url(#qHaloE2)"/>

  <text x="540" y="130" text-anchor="middle" fill="#F7931A" font-size="13" font-weight="600" letter-spacing="4">SYMBIOTIC-SOVEREIGN DOCTRINE</text>
  <rect x="490" y="148" width="100" height="2" fill="#F7931A"/>

  <!-- Two-arrow diagram -->
  <g transform="translate(140, 380)">
    <!-- Top: trust flows in -->
    <text x="0" y="0" fill="#B084FF" font-size="13" font-weight="700" letter-spacing="3">TRUST</text>
    <line x1="0" y1="20" x2="700" y2="20" stroke="#B084FF" stroke-width="3" marker-end="url(#arrowIn)" opacity="0.9"/>
    <text x="800" y="26" text-anchor="end" fill="#B084FF" font-size="13" font-weight="700" letter-spacing="3">INTO BITCOIN</text>

    <!-- Quote in middle -->
    <text x="400" y="120" text-anchor="middle" fill="#F0EAE0" font-size="56" font-weight="700">Trust flows in.</text>
    <text x="400" y="194" text-anchor="middle" fill="#F0EAE0" font-size="56" font-weight="700">Sovereignty flows out.</text>

    <!-- Bottom: sovereignty flows out -->
    <text x="0" y="276" fill="#F7931A" font-size="13" font-weight="700" letter-spacing="3">SOVEREIGNTY</text>
    <line x1="800" y1="290" x2="100" y2="290" stroke="#F7931A" stroke-width="3" marker-end="url(#arrowOut)" opacity="0.9"/>
    <text x="800" y="276" text-anchor="end" fill="#F7931A" font-size="13" font-weight="700" letter-spacing="3">OUT TO USERS</text>
  </g>

  <!-- Footer -->
  <rect x="490" y="930" width="100" height="2" fill="#F7931A"/>
  <text x="540" y="976" text-anchor="middle" fill="#B4BCC8" font-size="15" font-weight="500">From: Bitcoin Is No Longer Just the Foundational Layer</text>
  <text x="540" y="1004" text-anchor="middle" fill="#6C7684" font-size="13">thesovereign.academy · May 2026</text>
</svg>
