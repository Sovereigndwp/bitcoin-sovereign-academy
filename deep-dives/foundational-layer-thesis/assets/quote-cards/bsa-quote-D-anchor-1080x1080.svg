<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="qBgD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
    <radialGradient id="qHaloD" cx="50%" cy="100%" r="55%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.32)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#qBgD)"/>
  <rect width="1080" height="1080" fill="url(#qHaloD)"/>

  <text x="540" y="130" text-anchor="middle" fill="#F7931A" font-size="13" font-weight="600" letter-spacing="4">THE SOVEREIGN ACADEMY</text>
  <rect x="490" y="148" width="100" height="2" fill="#F7931A"/>

  <!-- Quote -->
  <text x="540" y="380" text-anchor="middle" fill="#F0EAE0" font-size="52" font-weight="700">Bitcoin doesn't have</text>
  <text x="540" y="448" text-anchor="middle" fill="#F0EAE0" font-size="52" font-weight="700">to be everything.</text>

  <rect x="490" y="510" width="100" height="2" fill="#F7931A" opacity="0.7"/>

  <text x="540" y="600" text-anchor="middle" fill="#F7931A" font-size="52" font-weight="700">It has to be the anchor</text>
  <text x="540" y="668" text-anchor="middle" fill="#F7931A" font-size="52" font-weight="700">for everything.</text>

  <!-- Footer -->
  <rect x="490" y="930" width="100" height="2" fill="#F7931A"/>
  <text x="540" y="976" text-anchor="middle" fill="#B4BCC8" font-size="15" font-weight="500">From: Bitcoin Is No Longer Just the Foundational Layer</text>
  <text x="540" y="1004" text-anchor="middle" fill="#6C7684" font-size="13">thesovereign.academy · May 2026</text>
</svg>
