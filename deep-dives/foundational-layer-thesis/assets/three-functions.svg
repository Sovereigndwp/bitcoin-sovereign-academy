<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1200" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="infoBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#141A22"/>
    </linearGradient>
    <radialGradient id="infoHalo" cx="50%" cy="6%" r="50%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.16)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
    <linearGradient id="laneOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.18)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0.04)"/>
    </linearGradient>
    <linearGradient id="laneBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(91,163,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(91,163,255,0.04)"/>
    </linearGradient>
    <linearGradient id="lanePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(176,132,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(176,132,255,0.04)"/>
    </linearGradient>
    <marker id="seqArrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,1 L0,13 L12,7 z" fill="#F0EAE0"/>
    </marker>
  </defs>

  <rect width="1400" height="1200" fill="url(#infoBg)"/>
  <rect width="1400" height="400" fill="url(#infoHalo)"/>

  <!-- Header -->
  <text x="700" y="80" text-anchor="middle" fill="#F7931A" font-size="14" font-weight="600" letter-spacing="4">THE SOVEREIGN ACADEMY</text>
  <text x="700" y="135" text-anchor="middle" fill="#F0EAE0" font-size="42" font-weight="700">Money's Three Functions</text>
  <text x="700" y="178" text-anchor="middle" fill="#B4BCC8" font-size="18">Sequential, not parallel. Bitcoin's path runs them in order — and that ordering is the thesis.</text>

  <!-- Sequence indicator -->
  <g transform="translate(0, 215)">
    <text x="320" y="0" text-anchor="middle" fill="#6C7684" font-size="12" letter-spacing="3">STEP 01</text>
    <text x="700" y="0" text-anchor="middle" fill="#6C7684" font-size="12" letter-spacing="3">STEP 02</text>
    <text x="1080" y="0" text-anchor="middle" fill="#6C7684" font-size="12" letter-spacing="3">STEP 03</text>

    <line x1="430" y1="-5" x2="590" y2="-5" stroke="#F0EAE0" stroke-width="1.5" marker-end="url(#seqArrow)" opacity="0.6"/>
    <line x1="810" y1="-5" x2="970" y2="-5" stroke="#F0EAE0" stroke-width="1.5" marker-end="url(#seqArrow)" opacity="0.6"/>
  </g>

  <!-- Lane 1: Store of Value -->
  <g>
    <rect x="60" y="250" width="380" height="800" rx="14" fill="url(#laneOrange)" stroke="#F7931A" stroke-width="1.8"/>
    <text x="80" y="290" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="3">FUNCTION 01</text>
    <text x="80" y="328" fill="#F0EAE0" font-size="28" font-weight="700">Store of Value</text>

    <text x="80" y="372" fill="#FFA94D" font-size="12" font-weight="600" letter-spacing="2">DEFINITION</text>
    <text x="80" y="394" fill="#F0EAE0" font-size="13">Ability to hold purchasing power</text>
    <text x="80" y="412" fill="#F0EAE0" font-size="13">across time without dilution.</text>

    <text x="80" y="452" fill="#FFA94D" font-size="12" font-weight="600" letter-spacing="2">LIVES ON</text>
    <text x="80" y="474" fill="#F0EAE0" font-size="13">The asset itself — not the rails</text>
    <text x="80" y="492" fill="#F0EAE0" font-size="13">that move it.</text>

    <text x="80" y="532" fill="#FFA94D" font-size="12" font-weight="600" letter-spacing="2">REQUIRES</text>
    <text x="80" y="554" fill="#F0EAE0" font-size="13">Scarcity. Verifiability.</text>
    <text x="80" y="572" fill="#F0EAE0" font-size="13">Credible absence of dilution.</text>

    <text x="80" y="612" fill="#FFA94D" font-size="12" font-weight="600" letter-spacing="2">BITCOIN STATUS</text>
    <rect x="80" y="624" width="260" height="26" rx="13" fill="#F7931A"/>
    <text x="210" y="642" text-anchor="middle" fill="#0B0F14" font-size="12" font-weight="700">DOMINANT DIGITAL SoV CANDIDATE</text>

    <text x="80" y="688" fill="#FFA94D" font-size="12" font-weight="600" letter-spacing="2">WHY</text>
    <text x="80" y="710" fill="#F0EAE0" font-size="13">21M supply cap fixed by</text>
    <text x="80" y="728" fill="#F0EAE0" font-size="13">protocol consensus · No issuer ·</text>
    <text x="80" y="746" fill="#F0EAE0" font-size="13">No foundation · 17-year track record.</text>

    <text x="80" y="788" fill="#FFA94D" font-size="12" font-weight="600" letter-spacing="2">LIVES AT</text>
    <text x="80" y="810" fill="#F0EAE0" font-size="13">L0 — Bitcoin base protocol.</text>

    <text x="80" y="848" fill="#FFA94D" font-size="12" font-weight="600" letter-spacing="2">KEY EVIDENCE</text>
    <text x="80" y="870" fill="#B4BCC8" font-size="12">· Fixed-supply credibility</text>
    <text x="80" y="888" fill="#B4BCC8" font-size="12">· Settlement assurance</text>
    <text x="80" y="906" fill="#B4BCC8" font-size="12">· Bearer asset semantics</text>

    <line x1="80" y1="940" x2="420" y2="940" stroke="#F7931A" stroke-width="1" opacity="0.3"/>
    <text x="80" y="970" fill="#F7931A" font-size="13" font-style="italic">The hardest to acquire,</text>
    <text x="80" y="990" fill="#F7931A" font-size="13" font-style="italic">the easiest to keep.</text>
    <text x="80" y="1020" fill="#6C7684" font-size="11">Took 17 years. Now structural within crypto-native assets.</text>
  </g>

  <!-- Lane 2: Medium of Exchange -->
  <g>
    <rect x="460" y="250" width="380" height="800" rx="14" fill="url(#laneBlue)" stroke="#5BA3FF" stroke-width="1.8"/>
    <text x="480" y="290" fill="#5BA3FF" font-size="11" font-weight="700" letter-spacing="3">FUNCTION 02</text>
    <text x="480" y="328" fill="#F0EAE0" font-size="28" font-weight="700">Medium of</text>
    <text x="480" y="356" fill="#F0EAE0" font-size="28" font-weight="700">Exchange</text>

    <text x="480" y="392" fill="#8FBEFF" font-size="12" font-weight="600" letter-spacing="2">DEFINITION</text>
    <text x="480" y="414" fill="#F0EAE0" font-size="13">Ability to transfer value reliably</text>
    <text x="480" y="432" fill="#F0EAE0" font-size="13">at low cost and high speed.</text>

    <text x="480" y="472" fill="#8FBEFF" font-size="12" font-weight="600" letter-spacing="2">LIVES ON</text>
    <text x="480" y="494" fill="#F0EAE0" font-size="13">The payment surface — rails,</text>
    <text x="480" y="512" fill="#F0EAE0" font-size="13">wallets, custody options, UX.</text>

    <text x="480" y="552" fill="#8FBEFF" font-size="12" font-weight="600" letter-spacing="2">REQUIRES</text>
    <text x="480" y="574" fill="#F0EAE0" font-size="13">Speed. Cost. Reach.</text>
    <text x="480" y="592" fill="#F0EAE0" font-size="13">Custody choice. Merchant tools.</text>

    <text x="480" y="632" fill="#8FBEFF" font-size="12" font-weight="600" letter-spacing="2">BITCOIN STATUS</text>
    <rect x="480" y="644" width="180" height="26" rx="13" fill="#5BA3FF"/>
    <text x="570" y="662" text-anchor="middle" fill="#0B0F14" font-size="12" font-weight="700">BUILDING NOW</text>

    <text x="480" y="708" fill="#8FBEFF" font-size="12" font-weight="600" letter-spacing="2">HOW</text>
    <text x="480" y="730" fill="#F0EAE0" font-size="13">Lightning (5,600+ BTC capacity).</text>
    <text x="480" y="748" fill="#F0EAE0" font-size="13">Ark (Arkade beta · Mar 2026).</text>
    <text x="480" y="766" fill="#F0EAE0" font-size="13">Spark (Lightspark institutional).</text>
    <text x="480" y="784" fill="#F0EAE0" font-size="13">USDT/USDC on Bitcoin rails.</text>

    <text x="480" y="824" fill="#8FBEFF" font-size="12" font-weight="600" letter-spacing="2">LIVES AT</text>
    <text x="480" y="846" fill="#F0EAE0" font-size="13">L1 + L2 + L2.5 + L4.</text>

    <text x="480" y="884" fill="#8FBEFF" font-size="12" font-weight="600" letter-spacing="2">KEY EVIDENCE</text>
    <text x="480" y="906" fill="#B4BCC8" font-size="12">· USDT live on Lightning (Mar 2026)</text>
    <text x="480" y="924" fill="#B4BCC8" font-size="12">· Boltz USDT/USDC non-custodial</text>
    <text x="480" y="942" fill="#B4BCC8" font-size="12">· Square Lightning POS rolling out</text>

    <line x1="480" y1="970" x2="820" y2="970" stroke="#5BA3FF" stroke-width="1" opacity="0.3"/>
    <text x="480" y="1000" fill="#5BA3FF" font-size="13" font-style="italic">Where Bitcoin was missing</text>
    <text x="480" y="1020" fill="#5BA3FF" font-size="13" font-style="italic">and is now being built.</text>
  </g>

  <!-- Lane 3: Unit of Account -->
  <g>
    <rect x="860" y="250" width="380" height="800" rx="14" fill="url(#lanePurple)" stroke="#B084FF" stroke-width="1.8"/>
    <text x="880" y="290" fill="#B084FF" font-size="11" font-weight="700" letter-spacing="3">FUNCTION 03</text>
    <text x="880" y="328" fill="#F0EAE0" font-size="28" font-weight="700">Unit of Account</text>

    <text x="880" y="372" fill="#C9A8FF" font-size="12" font-weight="600" letter-spacing="2">DEFINITION</text>
    <text x="880" y="394" fill="#F0EAE0" font-size="13">The denomination people think,</text>
    <text x="880" y="412" fill="#F0EAE0" font-size="13">price, contract, and save in.</text>

    <text x="880" y="452" fill="#C9A8FF" font-size="12" font-weight="600" letter-spacing="2">LIVES ON</text>
    <text x="880" y="474" fill="#F0EAE0" font-size="13">The application layer —</text>
    <text x="880" y="492" fill="#F0EAE0" font-size="13">invoices, debts, accounting.</text>

    <text x="880" y="532" fill="#C9A8FF" font-size="12" font-weight="600" letter-spacing="2">REQUIRES</text>
    <text x="880" y="554" fill="#F0EAE0" font-size="13">Habit. Denomination depth.</text>
    <text x="880" y="572" fill="#F0EAE0" font-size="13">Stable purchasing power.</text>

    <text x="880" y="612" fill="#C9A8FF" font-size="12" font-weight="600" letter-spacing="2">BITCOIN STATUS</text>
    <rect x="880" y="624" width="180" height="26" rx="13" fill="#B084FF"/>
    <text x="970" y="642" text-anchor="middle" fill="#0B0F14" font-size="12" font-weight="700">EMERGENT · SLOW</text>

    <text x="880" y="688" fill="#C9A8FF" font-size="12" font-weight="600" letter-spacing="2">EARLY SIGNALS</text>
    <text x="880" y="710" fill="#F0EAE0" font-size="13">El Salvador (post-rollback).</text>
    <text x="880" y="728" fill="#F0EAE0" font-size="13">Bitcoin-native salaries (small).</text>
    <text x="880" y="746" fill="#F0EAE0" font-size="13">Mining services · Lightning ops.</text>
    <text x="880" y="764" fill="#F0EAE0" font-size="13">Sat-denominated invoicing.</text>

    <text x="880" y="804" fill="#C9A8FF" font-size="12" font-weight="600" letter-spacing="2">LIVES AT</text>
    <text x="880" y="826" fill="#F0EAE0" font-size="13">L3 + L4 + human habit.</text>

    <text x="880" y="864" fill="#C9A8FF" font-size="12" font-weight="600" letter-spacing="2">PATH</text>
    <text x="880" y="886" fill="#B4BCC8" font-size="12">· First: Bitcoin-native workers</text>
    <text x="880" y="904" fill="#B4BCC8" font-size="12">· Then: high-inflation countries</text>
    <text x="880" y="922" fill="#B4BCC8" font-size="12">· Then: cross-border freelance</text>
    <text x="880" y="940" fill="#B4BCC8" font-size="12">· Last: neutral global trade</text>

    <line x1="880" y1="970" x2="1220" y2="970" stroke="#B084FF" stroke-width="1" opacity="0.3"/>
    <text x="880" y="1000" fill="#B084FF" font-size="13" font-style="italic">Cannot be engineered.</text>
    <text x="880" y="1020" fill="#B084FF" font-size="13" font-style="italic">Only earned through use.</text>
  </g>

  <!-- Bottom thesis bar (v4) -->
  <rect x="60" y="1090" width="1280" height="80" rx="12" fill="#141A22" stroke="#F7931A" stroke-width="1.2"/>
  <text x="80" y="1118" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="3">THE ONTOLOGICAL MOVE (v4)</text>
  <text x="80" y="1148" fill="#F0EAE0" font-size="15">Money's three functions live on different layers of any monetary stack.</text>
  <text x="80" y="1166" fill="#B4BCC8" font-size="13">Conflating the asset (SoV) with the payment surface (MoE) is a category error. SoV → MoE → UoA is a strategy with strong historical precedent, not a universal law.</text>
</svg>
