<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bgQ" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#141A22"/>
    </linearGradient>
    <radialGradient id="haloQ" cx="50%" cy="0%" r="55%">
      <stop offset="0%" stop-color="rgba(176,132,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(176,132,255,0)"/>
    </radialGradient>
    <linearGradient id="quantumBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(232,97,107,0.05)"/>
      <stop offset="50%" stop-color="rgba(232,97,107,0.35)"/>
      <stop offset="100%" stop-color="rgba(232,97,107,0.75)"/>
    </linearGradient>
    <linearGradient id="defenseBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(123,211,137,0.15)"/>
      <stop offset="50%" stop-color="rgba(123,211,137,0.55)"/>
      <stop offset="100%" stop-color="rgba(123,211,137,0.85)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgQ)"/>
  <rect width="1600" height="320" fill="url(#haloQ)"/>

  <!-- Header -->
  <text x="100" y="80" fill="#F7931A" font-size="14" font-weight="600" letter-spacing="3">THE SOVEREIGN ACADEMY · RESEARCH NOTE</text>
  <text x="100" y="135" fill="#F0EAE0" font-size="38" font-weight="700">Bitcoin's Quantum Race</text>
  <text x="100" y="170" fill="#B4BCC8" font-size="16">The two curves that determine F17: quantum hardware capability vs Bitcoin's quantum-resistance migration.</text>

  <text x="1500" y="80" text-anchor="end" fill="#6C7684" font-size="11" font-weight="500" letter-spacing="2">FIG · QUANTUM TIMELINE</text>
  <text x="1500" y="100" text-anchor="end" fill="#6C7684" font-size="11">v4 · May 2026</text>

  <!-- Time axis -->
  <line x1="180" y1="600" x2="1500" y2="600" stroke="#B4BCC8" stroke-width="2"/>

  <!-- Year markers -->
  <g font-size="11" fill="#B4BCC8">
    <g transform="translate(180, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle" font-weight="600">2026</text>
    </g>
    <g transform="translate(330, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle">2027</text>
    </g>
    <g transform="translate(480, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle" font-weight="600">2028</text>
    </g>
    <g transform="translate(630, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle">2029</text>
    </g>
    <g transform="translate(780, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle" font-weight="600">2030</text>
    </g>
    <g transform="translate(930, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle">2031</text>
    </g>
    <g transform="translate(1080, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle" font-weight="600">2032</text>
    </g>
    <g transform="translate(1230, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle">2035</text>
    </g>
    <g transform="translate(1380, 600)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#B4BCC8"/>
      <text x="0" y="25" text-anchor="middle">2040</text>
    </g>
  </g>

  <!-- F17 deadline marker -->
  <line x1="1080" y1="280" x2="1080" y2="600" stroke="#F7931A" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  <rect x="1010" y="240" width="140" height="35" rx="6" fill="#0B0F14" stroke="#F7931A" stroke-width="1.5"/>
  <text x="1080" y="262" text-anchor="middle" fill="#F7931A" font-size="11" font-weight="700">F17 DEADLINE</text>

  <!-- Quantum threat band (red, increasing probability) -->
  <path d="M 180,500 L 180,580 L 480,560 L 780,490 L 1080,420 L 1230,350 L 1380,290 L 1500,260 L 1500,580 L 1080,580 L 180,580 Z" fill="url(#quantumBand)" opacity="0.6"/>
  <path d="M 180,500 L 480,485 L 780,440 L 1080,370 L 1230,290 L 1380,230 L 1500,200" stroke="#E8616B" stroke-width="2.5" fill="none"/>
  <text x="1510" y="200" fill="#E8616B" font-size="13" font-weight="700">Quantum capability</text>
  <text x="1510" y="218" fill="#F8989E" font-size="11">CRQC probability</text>

  <!-- Bitcoin defense band (green, activating) -->
  <path d="M 180,550 L 480,535 L 780,420 L 1080,330 L 1230,260 L 1380,220 L 1500,200" stroke="#7BD389" stroke-width="2.5" fill="none"/>
  <path d="M 180,550 L 180,580 L 1500,580 L 1500,200 L 1380,220 L 1230,260 L 1080,330 L 780,420 L 480,535 Z" fill="url(#defenseBand)" opacity="0.4"/>
  <text x="1510" y="245" fill="#7BD389" font-size="13" font-weight="700">Bitcoin defense</text>
  <text x="1510" y="263" fill="#A8E4B0" font-size="11">QR migration progress</text>

  <!-- Key milestones -->
  <g>
    <!-- BIP-360 entered repo Feb 2026 -->
    <circle cx="200" cy="555" r="5" fill="#7BD389"/>
    <rect x="200" y="340" width="160" height="60" rx="6" fill="#141A22" stroke="#7BD389" stroke-width="1"/>
    <text x="210" y="358" fill="#7BD389" font-size="9" font-weight="700" letter-spacing="1">FEB 2026</text>
    <text x="210" y="375" fill="#F0EAE0" font-size="11" font-weight="600">BIP-360 in repo</text>
    <text x="210" y="392" fill="#B4BCC8" font-size="10">P2MR draft published</text>
    <line x1="280" y1="400" x2="200" y2="550" stroke="#7BD389" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

    <!-- BTQ testnet Mar 2026 -->
    <circle cx="225" cy="552" r="5" fill="#7BD389"/>

    <!-- 2028 halving (orange) -->
    <line x1="480" y1="430" x2="480" y2="600" stroke="#F7931A" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <rect x="395" y="430" width="170" height="50" rx="6" fill="#141A22" stroke="#F7931A" stroke-width="1"/>
    <text x="480" y="450" text-anchor="middle" fill="#F7931A" font-size="11" font-weight="700">APR 2028</text>
    <text x="480" y="468" text-anchor="middle" fill="#F0EAE0" font-size="11">Halving · Subsidy 1.5625 BTC</text>

    <!-- 2030 milestone -->
    <circle cx="780" cy="440" r="6" fill="#FFC857"/>
    <rect x="700" y="465" width="200" height="60" rx="6" fill="#141A22" stroke="#FFC857" stroke-width="1"/>
    <text x="800" y="482" text-anchor="middle" fill="#FFC857" font-size="11" font-weight="700">2030 CHECKPOINT</text>
    <text x="800" y="499" text-anchor="middle" fill="#F0EAE0" font-size="11">CRQC probability: 5–15%</text>
    <text x="800" y="515" text-anchor="middle" fill="#F0EAE0" font-size="11">QR migration: 20–40% active</text>

    <!-- 2035 -->
    <circle cx="1230" cy="290" r="6" fill="#FFC857"/>
    <rect x="1140" y="100" width="200" height="80" rx="6" fill="#141A22" stroke="#FFC857" stroke-width="1"/>
    <text x="1240" y="120" text-anchor="middle" fill="#FFC857" font-size="11" font-weight="700">2035</text>
    <text x="1240" y="138" text-anchor="middle" fill="#F0EAE0" font-size="11">CRQC: 30–60%</text>
    <text x="1240" y="155" text-anchor="middle" fill="#F0EAE0" font-size="11">QR active: 65–85%</text>
    <text x="1240" y="172" text-anchor="middle" fill="#A8E4B0" font-size="10">Critical race point</text>
    <line x1="1240" y1="180" x2="1230" y2="285" stroke="#FFC857" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

    <!-- 2040 -->
    <circle cx="1380" cy="230" r="6" fill="#E8616B"/>
    <rect x="1290" y="350" width="200" height="60" rx="6" fill="#141A22" stroke="#E8616B" stroke-width="1"/>
    <text x="1390" y="370" text-anchor="middle" fill="#E8616B" font-size="11" font-weight="700">2040</text>
    <text x="1390" y="388" text-anchor="middle" fill="#F0EAE0" font-size="11">CRQC: 70–90%</text>
    <text x="1390" y="404" text-anchor="middle" fill="#F0EAE0" font-size="11">QR active: 90%+</text>
  </g>

  <!-- Today marker -->
  <line x1="200" y1="600" x2="200" y2="620" stroke="#F7931A" stroke-width="3"/>
  <text x="200" y="640" text-anchor="middle" fill="#F7931A" font-size="11" font-weight="700">MAY 2026</text>
  <text x="200" y="656" text-anchor="middle" fill="#FFA94D" font-size="10">today · F17 INDETERMINATE</text>

  <!-- Bottom callout -->
  <rect x="100" y="700" width="1400" height="120" rx="10" fill="#141A22" stroke="#B084FF" stroke-width="1"/>
  <text x="120" y="730" fill="#B084FF" font-size="11" font-weight="700" letter-spacing="3">WHAT F17 TRACKS</text>
  <text x="120" y="755" fill="#F0EAE0" font-size="13">F17 fires if EITHER (a) a cryptographically relevant quantum computer capable of breaking ECDSA is publicly demonstrated before end of 2032 AND BIP-360-class quantum-resistant addresses</text>
  <text x="120" y="775" fill="#F0EAE0" font-size="13">have not yet activated on Bitcoin mainnet, OR (b) any successful quantum-attack-based theft of BTC from a previously-secure address occurs, at any scale, before end of 2032.</text>
  <text x="120" y="800" fill="#FFA94D" font-size="12" font-style="italic">F17 is the only single-event falsifier that could unilaterally invalidate Bitcoin's SoV claim. Most other fires erode position; quantum could destroy it.</text>
</svg>
