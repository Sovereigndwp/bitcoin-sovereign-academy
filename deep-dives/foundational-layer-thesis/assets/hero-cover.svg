<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="50%" stop-color="#13191F"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
    <radialGradient id="heroHalo" cx="78%" cy="42%" r="55%">
      <stop offset="0%" stop-color="rgba(247,147,26,0.32)"/>
      <stop offset="60%" stop-color="rgba(247,147,26,0.08)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </radialGradient>
    <radialGradient id="heroHalo2" cx="15%" cy="78%" r="40%">
      <stop offset="0%" stop-color="rgba(91,163,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(91,163,255,0)"/>
    </radialGradient>
    <linearGradient id="orangeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(247,147,26,0)"/>
      <stop offset="50%" stop-color="rgba(247,147,26,0.9)"/>
      <stop offset="100%" stop-color="rgba(247,147,26,0)"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#heroBg)"/>
  <rect width="1600" height="900" fill="url(#heroHalo)"/>
  <rect width="1600" height="900" fill="url(#heroHalo2)"/>

  <!-- Decorative stack motif (right side) -->
  <g opacity="0.55" transform="translate(1080, 180)">
    <rect x="0" y="0" width="380" height="48" rx="6" fill="none" stroke="#F7931A" stroke-width="1.2" stroke-opacity="0.35"/>
    <text x="20" y="30" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="2" opacity="0.55">L4 · FIAT BRIDGE</text>
    <text x="360" y="30" text-anchor="end" fill="#B4BCC8" font-size="10" opacity="0.45">Boltz · Lightspark · Strike</text>

    <rect x="0" y="60" width="380" height="48" rx="6" fill="none" stroke="#F7931A" stroke-width="1.4" stroke-opacity="0.5"/>
    <text x="20" y="90" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="2" opacity="0.7">L3 · PROGRAMMABILITY</text>
    <text x="360" y="90" text-anchor="end" fill="#B4BCC8" font-size="10" opacity="0.55">Citrea · Botanix · Stacks</text>

    <rect x="0" y="120" width="380" height="48" rx="6" fill="none" stroke="#F7931A" stroke-width="1.5" stroke-opacity="0.65"/>
    <text x="20" y="150" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="2" opacity="0.8">L2.5 · FEDERATIONS</text>
    <text x="360" y="150" text-anchor="end" fill="#B4BCC8" font-size="10" opacity="0.65">Fedimint · Cashu</text>

    <rect x="0" y="180" width="380" height="48" rx="6" fill="none" stroke="#F7931A" stroke-width="1.7" stroke-opacity="0.8"/>
    <text x="20" y="210" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="2" opacity="0.9">L2 · PAYMENT NETWORKS</text>
    <text x="360" y="210" text-anchor="end" fill="#B4BCC8" font-size="10" opacity="0.75">Lightning · Ark · Spark</text>

    <rect x="0" y="240" width="380" height="48" rx="6" fill="none" stroke="#F7931A" stroke-width="1.9" stroke-opacity="0.9"/>
    <text x="20" y="270" fill="#F7931A" font-size="11" font-weight="700" letter-spacing="2" opacity="0.95">L1 · ASSET LAYERS</text>
    <text x="360" y="270" text-anchor="end" fill="#B4BCC8" font-size="10" opacity="0.85">Liquid · RGB · Taproot Assets</text>

    <rect x="0" y="300" width="380" height="60" rx="8" fill="rgba(247,147,26,0.12)" stroke="#F7931A" stroke-width="2.2"/>
    <text x="20" y="335" fill="#F7931A" font-size="13" font-weight="700" letter-spacing="2">L0 · BITCOIN</text>
    <text x="360" y="335" text-anchor="end" fill="#F0EAE0" font-size="12" font-weight="600">The settlement anchor</text>
  </g>

  <!-- Top eyebrow -->
  <text x="100" y="120" fill="#F7931A" font-size="14" font-weight="600" letter-spacing="4">THE SOVEREIGN ACADEMY · RESEARCH NOTE · MAY 2026</text>

  <!-- Orange separator -->
  <rect x="100" y="140" width="120" height="2" fill="#F7931A"/>

  <!-- Title -->
  <text x="100" y="240" fill="#F0EAE0" font-size="68" font-weight="700" letter-spacing="-1">Bitcoin Is No Longer</text>
  <text x="100" y="316" fill="#F0EAE0" font-size="68" font-weight="700" letter-spacing="-1">Just the Foundational</text>
  <text x="100" y="392" fill="#F7931A" font-size="68" font-weight="700" letter-spacing="-1">Layer.</text>

  <!-- Subtitle -->
  <text x="100" y="470" fill="#B4BCC8" font-size="22" font-weight="500">A first-principles, symbiotic-sovereign thesis on how Bitcoin is</text>
  <text x="100" y="500" fill="#B4BCC8" font-size="22" font-weight="500">becoming the best form of money — not by copying other chains,</text>
  <text x="100" y="530" fill="#B4BCC8" font-size="22" font-weight="500">but by absorbing their best capabilities into a stack it controls.</text>

  <!-- Stat row -->
  <rect x="100" y="640" width="2" height="60" fill="#F7931A"/>
  <text x="120" y="660" fill="#6C7684" font-size="11" font-weight="600" letter-spacing="2">SOV</text>
  <text x="120" y="690" fill="#F0EAE0" font-size="16" font-weight="600">Won at L1</text>

  <rect x="320" y="640" width="2" height="60" fill="#5BA3FF"/>
  <text x="340" y="660" fill="#6C7684" font-size="11" font-weight="600" letter-spacing="2">MOE</text>
  <text x="340" y="690" fill="#F0EAE0" font-size="16" font-weight="600">Being built now</text>

  <rect x="600" y="640" width="2" height="60" fill="#B084FF"/>
  <text x="620" y="660" fill="#6C7684" font-size="11" font-weight="600" letter-spacing="2">UOA</text>
  <text x="620" y="690" fill="#F0EAE0" font-size="16" font-weight="600">Emergent, slow, inevitable</text>

  <!-- Bottom footer -->
  <rect x="0" y="820" width="1600" height="2" fill="url(#orangeLine)"/>
  <text x="100" y="858" fill="#6C7684" font-size="13" letter-spacing="3">THE SOVEREIGN ACADEMY</text>
  <text x="100" y="878" fill="#6C7684" font-size="11">thesovereign.academy · Research note 2026.05</text>

  <text x="1500" y="858" text-anchor="end" fill="#6C7684" font-size="13" letter-spacing="3">SYMBIOTIC-SOVEREIGN</text>
  <text x="1500" y="878" text-anchor="end" fill="#6C7684" font-size="11">Thesis v1 · Falsification framework included</text>
</svg>
