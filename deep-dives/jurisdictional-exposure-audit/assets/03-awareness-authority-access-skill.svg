<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" role="img" aria-labelledby="t3 d3" font-family="Inter, system-ui, sans-serif">
  <title id="t3">Awareness, authority, access, and skill are four separate capabilities</title>
  <desc id="d3">Four stacked capability bars for the people in a plan. Awareness: knows the Bitcoin exists. Authority: has the legal right to act. Access: can reach the keys. Skill: can actually execute a recovery. A healthy plan distributes these across coordinated people so no single person is indispensable and no single person holds everything. One person holding all four is a concentration risk; nobody holding a given one is a gap.</desc>
  <rect width="760" height="400" fill="#16181C"/>
  <text x="380" y="44" fill="#F7F7F2" font-size="22" font-weight="700" text-anchor="middle">Four capabilities a plan must place</text>
  <text x="380" y="70" fill="#9CA0A8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', monospace">DISTRIBUTED, NOT CONCENTRATED</text>

  <g>
    <rect x="120" y="110" width="520" height="46" rx="8" fill="#1F2024" stroke="#2D2F35"/>
    <rect x="120" y="110" width="150" height="46" rx="8" fill="#FF7A00" opacity="0.85"/>
    <text x="40" y="139" fill="#9CA0A8" font-size="13" font-family="'JetBrains Mono', monospace">AWARE</text>
    <text x="135" y="139" fill="#16181C" font-size="13" font-weight="700">knows it exists</text>

    <rect x="120" y="170" width="520" height="46" rx="8" fill="#1F2024" stroke="#2D2F35"/>
    <rect x="120" y="170" width="150" height="46" rx="8" fill="#FF7A00" opacity="0.7"/>
    <text x="40" y="199" fill="#9CA0A8" font-size="13" font-family="'JetBrains Mono', monospace">AUTHORITY</text>
    <text x="135" y="199" fill="#16181C" font-size="13" font-weight="700">legal right to act</text>

    <rect x="120" y="230" width="520" height="46" rx="8" fill="#1F2024" stroke="#2D2F35"/>
    <rect x="120" y="230" width="150" height="46" rx="8" fill="#FF7A00" opacity="0.55"/>
    <text x="40" y="259" fill="#9CA0A8" font-size="13" font-family="'JetBrains Mono', monospace">ACCESS</text>
    <text x="135" y="259" fill="#16181C" font-size="13" font-weight="700">can reach the keys</text>

    <rect x="120" y="290" width="520" height="46" rx="8" fill="#1F2024" stroke="#2D2F35"/>
    <rect x="120" y="290" width="150" height="46" rx="8" fill="#FF7A00" opacity="0.4"/>
    <text x="40" y="319" fill="#9CA0A8" font-size="13" font-family="'JetBrains Mono', monospace">SKILL</text>
    <text x="135" y="319" fill="#F7F7F2" font-size="13" font-weight="700">can execute recovery</text>
  </g>
  <text x="380" y="372" fill="#9CA0A8" font-size="12" text-anchor="middle">Authority without access stalls. Access without authority is a liability. Awareness without skill invites scams.</text>
</svg>
