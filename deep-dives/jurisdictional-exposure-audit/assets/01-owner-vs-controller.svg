<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" role="img" aria-labelledby="t1 d1" font-family="Inter, system-ui, sans-serif">
  <title id="t1">Legal owner versus technical controller</title>
  <desc id="d1">Two separate boxes. On the left, legal owner or authority: the will, executor, or trustee, who holds the legal right to act. On the right, technical controller or access: whoever holds the keys, who has the actual ability to move funds. A gap labelled "the gap" sits between them, because authority and access can be held by different people.</desc>
  <rect width="760" height="380" fill="#16181C"/>
  <text x="380" y="44" fill="#F7F7F2" font-size="22" font-weight="700" text-anchor="middle">Authority is not access</text>
  <text x="380" y="70" fill="#9CA0A8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', monospace">THE CENTRAL ESTATE GAP</text>

  <!-- left: authority -->
  <rect x="60" y="110" width="270" height="200" rx="12" fill="#1F2024" stroke="#2D2F35"/>
  <text x="195" y="150" fill="#FF7A00" font-size="13" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">LEGAL OWNER</text>
  <text x="195" y="172" fill="#9CA0A8" font-size="12" text-anchor="middle">the right to act</text>
  <text x="195" y="214" fill="#F7F7F2" font-size="15" text-anchor="middle">Will · Executor</text>
  <text x="195" y="240" fill="#F7F7F2" font-size="15" text-anchor="middle">Trustee · Court</text>
  <text x="195" y="284" fill="#9CA0A8" font-size="12" text-anchor="middle">Can be granted by a document</text>

  <!-- right: access -->
  <rect x="430" y="110" width="270" height="200" rx="12" fill="#1F2024" stroke="#2D2F35"/>
  <text x="565" y="150" fill="#FF7A00" font-size="13" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">TECHNICAL CONTROLLER</text>
  <text x="565" y="172" fill="#9CA0A8" font-size="12" text-anchor="middle">the ability to act</text>
  <text x="565" y="214" fill="#F7F7F2" font-size="15" text-anchor="middle">Whoever holds</text>
  <text x="565" y="240" fill="#F7F7F2" font-size="15" text-anchor="middle">the keys</text>
  <text x="565" y="284" fill="#9CA0A8" font-size="12" text-anchor="middle">Cannot be granted by a memo</text>

  <!-- gap -->
  <line x1="340" y1="210" x2="420" y2="210" stroke="#dc3545" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="380" y="200" fill="#dc3545" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace">THE GAP</text>
  <text x="380" y="338" fill="#9CA0A8" font-size="12" text-anchor="middle">An executor with full authority still cannot move self-custodied Bitcoin without the keys.</text>
</svg>
