<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" aria-labelledby="t8 d8" font-family="Inter, system-ui, sans-serif">
  <title id="t8">The family and advisor role map</title>
  <desc id="d8">The holder sits at the centre, connected to six roles: spouse, heirs, executor, attorney, tax or financial advisor, and a technical helper. Each role typically holds only some of awareness, authority, access, and skill. The risk is not any single person but the coordination between them: a plan that depends on one person, or where the person with authority cannot reach the person with access, breaks under pressure. The goal is that the right people hold the right piece and no single person is indispensable.</desc>
  <rect width="760" height="440" fill="#16181C"/>
  <text x="380" y="40" fill="#F7F7F2" font-size="22" font-weight="700" text-anchor="middle">The family and advisor map</text>
  <text x="380" y="66" fill="#9CA0A8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', monospace">COORDINATION IS THE WEAK POINT, NOT THE WALLET</text>

  <!-- edges -->
  <g stroke="#2D2F35" stroke-width="2">
    <line x1="380" y1="240" x2="180" y2="140"/>
    <line x1="380" y1="240" x2="380" y2="120"/>
    <line x1="380" y1="240" x2="580" y2="140"/>
    <line x1="380" y1="240" x2="160" y2="300"/>
    <line x1="380" y1="240" x2="380" y2="380"/>
    <line x1="380" y1="240" x2="600" y2="300"/>
  </g>

  <!-- center -->
  <circle cx="380" cy="240" r="46" fill="#FF7A00"/>
  <text x="380" y="238" fill="#16181C" font-size="14" font-weight="700" text-anchor="middle">Holder</text>
  <text x="380" y="256" fill="#16181C" font-size="10" text-anchor="middle">aware · auth · access</text>

  <!-- nodes -->
  <g text-anchor="middle">
    <circle cx="180" cy="140" r="38" fill="#1F2024" stroke="#2D2F35"/><text x="180" y="138" fill="#F7F7F2" font-size="13">Spouse</text><text x="180" y="155" fill="#9CA0A8" font-size="10">aware</text>
    <circle cx="380" cy="110" r="38" fill="#1F2024" stroke="#2D2F35"/><text x="380" y="108" fill="#F7F7F2" font-size="13">Heirs</text><text x="380" y="125" fill="#9CA0A8" font-size="10">future authority</text>
    <circle cx="580" cy="140" r="38" fill="#1F2024" stroke="#2D2F35"/><text x="580" y="138" fill="#F7F7F2" font-size="13">Executor</text><text x="580" y="155" fill="#9CA0A8" font-size="10">authority</text>
    <circle cx="150" cy="300" r="38" fill="#1F2024" stroke="#2D2F35"/><text x="150" y="298" fill="#F7F7F2" font-size="13">Attorney</text><text x="150" y="315" fill="#9CA0A8" font-size="10">authority</text>
    <circle cx="380" cy="382" r="38" fill="#1F2024" stroke="#2D2F35"/><text x="380" y="380" fill="#F7F7F2" font-size="12">Tech helper</text><text x="380" y="397" fill="#9CA0A8" font-size="10">access · skill</text>
    <circle cx="610" cy="300" r="38" fill="#1F2024" stroke="#2D2F35"/><text x="610" y="298" fill="#F7F7F2" font-size="13">Advisor</text><text x="610" y="315" fill="#9CA0A8" font-size="10">aware</text>
  </g>
</svg>
