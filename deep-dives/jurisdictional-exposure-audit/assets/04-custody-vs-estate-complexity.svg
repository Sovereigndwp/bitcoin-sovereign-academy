<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="t4 d4" font-family="Inter, system-ui, sans-serif">
  <title id="t4">Custody model versus estate and continuity complexity</title>
  <desc id="d4">A chart with custody counterparty risk decreasing left to right, and estate or continuity complexity increasing upward. Exchange or ETF sits low-complexity but high counterparty risk. Single-signature self-custody removes counterparty risk but raises personal recovery and inheritance responsibility. DIY multisig held by one person looks distributed but is operationally a single point with high estate complexity. Collaborative custody spreads key control and can lower continuity complexity at the cost of a service relationship. No option is best in the abstract; fit depends on who must act and when.</desc>
  <rect width="760" height="420" fill="#16181C"/>
  <text x="380" y="40" fill="#F7F7F2" font-size="22" font-weight="700" text-anchor="middle">Custody model vs estate complexity</text>

  <!-- axes -->
  <line x1="90" y1="350" x2="700" y2="350" stroke="#2D2F35" stroke-width="2"/>
  <line x1="90" y1="80" x2="90" y2="350" stroke="#2D2F35" stroke-width="2"/>
  <text x="395" y="392" fill="#9CA0A8" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace">COUNTERPARTY RISK  ←  more · less  →</text>
  <text x="60" y="215" fill="#9CA0A8" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace" transform="rotate(-90 60 215)">ESTATE / CONTINUITY COMPLEXITY →</text>

  <!-- points -->
  <g font-size="12" text-anchor="middle">
    <circle cx="180" cy="315" r="9" fill="#f59e0b"/>
    <text x="180" y="300" fill="#F7F7F2">Exchange / ETF</text>
    <text x="180" y="338" fill="#9CA0A8" font-size="11">low effort, counterparty risk</text>

    <circle cx="430" cy="250" r="9" fill="#FF7A00"/>
    <text x="430" y="235" fill="#F7F7F2">Single-sig self-custody</text>
    <text x="430" y="273" fill="#9CA0A8" font-size="11">you own recovery + records</text>

    <circle cx="560" cy="150" r="9" fill="#dc3545"/>
    <text x="560" y="135" fill="#F7F7F2">DIY multisig, one holder</text>
    <text x="560" y="173" fill="#9CA0A8" font-size="11">looks distributed, acts single</text>

    <circle cx="640" cy="285" r="9" fill="#28a745"/>
    <text x="620" y="270" fill="#F7F7F2">Collaborative custody</text>
    <text x="620" y="308" fill="#9CA0A8" font-size="11">shared keys, service relationship</text>
  </g>
</svg>
