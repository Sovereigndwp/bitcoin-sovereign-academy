<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" role="img" aria-labelledby="t2 d2" font-family="Inter, system-ui, sans-serif">
  <title id="t2">Residence, citizenship, tax residence, and banking jurisdiction are four different things</title>
  <desc id="d2">Four columns, each a separate attachment that can point to a different country. Residence is where you live. Citizenship is your passport. Tax residence is who taxes you. Banking jurisdiction is where your money clears. They do not have to be the same country, and the mismatch is where exposure hides.</desc>
  <rect width="760" height="380" fill="#16181C"/>
  <text x="380" y="44" fill="#F7F7F2" font-size="22" font-weight="700" text-anchor="middle">Four attachments, four countries</text>
  <text x="380" y="70" fill="#9CA0A8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', monospace">THEY DO NOT HAVE TO MATCH</text>

  <g font-size="14" text-anchor="middle">
    <!-- col 1 -->
    <rect x="40" y="110" width="160" height="210" rx="12" fill="#1F2024" stroke="#2D2F35"/>
    <text x="120" y="148" fill="#FF7A00" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">RESIDENCE</text>
    <text x="120" y="176" fill="#9CA0A8" font-size="12">where you live</text>
    <text x="120" y="250" fill="#F7F7F2" font-size="34">🏠</text>
    <text x="120" y="296" fill="#9CA0A8" font-size="12">Country A</text>
    <!-- col 2 -->
    <rect x="220" y="110" width="160" height="210" rx="12" fill="#1F2024" stroke="#2D2F35"/>
    <text x="300" y="148" fill="#FF7A00" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">CITIZENSHIP</text>
    <text x="300" y="176" fill="#9CA0A8" font-size="12">your passport</text>
    <text x="300" y="250" fill="#F7F7F2" font-size="34">🛂</text>
    <text x="300" y="296" fill="#9CA0A8" font-size="12">Country B</text>
    <!-- col 3 -->
    <rect x="400" y="110" width="160" height="210" rx="12" fill="#1F2024" stroke="#2D2F35"/>
    <text x="480" y="148" fill="#FF7A00" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">TAX RESIDENCE</text>
    <text x="480" y="176" fill="#9CA0A8" font-size="12">who taxes you</text>
    <text x="480" y="250" fill="#F7F7F2" font-size="34">🧾</text>
    <text x="480" y="296" fill="#9CA0A8" font-size="12">Country C (or more)</text>
    <!-- col 4 -->
    <rect x="580" y="110" width="160" height="210" rx="12" fill="#1F2024" stroke="#2D2F35"/>
    <text x="660" y="148" fill="#FF7A00" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">BANKING</text>
    <text x="660" y="176" fill="#9CA0A8" font-size="12">where money clears</text>
    <text x="660" y="250" fill="#F7F7F2" font-size="34">🏦</text>
    <text x="660" y="296" fill="#9CA0A8" font-size="12">Country D</text>
  </g>
  <text x="380" y="352" fill="#9CA0A8" font-size="12" text-anchor="middle">A passport is not a tax home. Where you live is not where your money is bankable.</text>
</svg>
