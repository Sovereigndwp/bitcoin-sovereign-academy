<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="orangeBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
    <style>
      text { font-family: "Helvetica Neue", "Inter", "Segoe UI", Arial, sans-serif; }
      .tag { font-size: 18px; font-weight: 700; letter-spacing: 4px; fill: #f7931a; }
      .title { font-weight: 900; letter-spacing: 1px; fill: #ffffff; }
      .subtitle { font-size: 22px; font-style: italic; fill: #facc15; }
      .arc-chip { font-size: 17px; font-weight: 700; fill: #ffffff; letter-spacing: 1px; }
      .arc-cap { font-size: 14px; font-style: italic; fill: #aaa; }
      .row-name { font-size: 19px; font-weight: 700; fill: #f7931a; }
      .row-does { font-size: 14px; fill: #ddd; }
      .row-num { font-size: 22px; font-weight: 900; fill: #1a1a1a; }
      .key-lesson { font-size: 22px; font-weight: 800; fill: #1a1a1a; letter-spacing: 0.5px; }
      .footer { font-size: 12px; fill: #888; letter-spacing: 1.5px; }
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#orangeBand)"/>

  <!-- Header -->
  <text x="60" y="58" class="tag">FUNDAMENTO 2 DE 5</text>
  <text x="60" y="110" class="title" font-size="44">ANATOMÍA DE UNA BILLETERA BITCOIN</text>
  <text x="60" y="148" class="subtitle">Una billetera no es una sola cosa. Es un pequeño sistema que</text>
  <text x="60" y="176" class="subtitle">hace cinco trabajos a la vez.</text>

  <!-- Arc as hero -->
  <g transform="translate(0, 212)">
    <g transform="translate(109, 0)">
      <rect width="150" height="48" rx="24" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="2"/>
      <text x="75" y="31" text-anchor="middle" class="arc-chip">RNG</text>
    </g>
    <g transform="translate(287, 0)">
      <rect width="150" height="48" rx="24" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="2"/>
      <text x="75" y="31" text-anchor="middle" class="arc-chip">Semilla</text>
    </g>
    <g transform="translate(465, 0)">
      <rect width="150" height="48" rx="24" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="2"/>
      <text x="75" y="31" text-anchor="middle" class="arc-chip">Árbol</text>
    </g>
    <g transform="translate(643, 0)">
      <rect width="150" height="48" rx="24" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="2"/>
      <text x="75" y="31" text-anchor="middle" class="arc-chip">Firma</text>
    </g>
    <g transform="translate(821, 0)">
      <rect width="150" height="48" rx="24" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="2"/>
      <text x="75" y="31" text-anchor="middle" class="arc-chip">Red</text>
    </g>
    <line x1="261" y1="24" x2="281" y2="24" stroke="#f7931a" stroke-width="2.5"/>
    <polygon points="281,24 273,18 273,30" fill="#f7931a"/>
    <line x1="439" y1="24" x2="459" y2="24" stroke="#f7931a" stroke-width="2.5"/>
    <polygon points="459,24 451,18 451,30" fill="#f7931a"/>
    <line x1="617" y1="24" x2="637" y2="24" stroke="#f7931a" stroke-width="2.5"/>
    <polygon points="637,24 629,18 629,30" fill="#f7931a"/>
    <line x1="795" y1="24" x2="815" y2="24" stroke="#f7931a" stroke-width="2.5"/>
    <polygon points="815,24 807,18 807,30" fill="#f7931a"/>
  </g>

  <!-- 5 compact rows: number · name · does (single line) -->
  <g transform="translate(60, 292)">
    <rect width="960" height="74" rx="12" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
    <circle cx="38" cy="37" r="22" fill="url(#orangeBand)"/>
    <text x="38" y="45" text-anchor="middle" class="row-num">1</text>
    <text x="78" y="32" class="row-name">Generador de números aleatorios</text>
    <text x="78" y="56" class="row-does">Produce la entropía que se convierte en la semilla.</text>
  </g>
  <g transform="translate(60, 376)">
    <rect width="960" height="74" rx="12" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
    <circle cx="38" cy="37" r="22" fill="url(#orangeBand)"/>
    <text x="38" y="45" text-anchor="middle" class="row-num">2</text>
    <text x="78" y="32" class="row-name">Almacenamiento de la semilla</text>
    <text x="78" y="56" class="row-does">Convierte la entropía + checksum en 12 o 24 palabras legibles. El</text>
  </g>
  <g transform="translate(60, 460)">
    <rect width="960" height="74" rx="12" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
    <circle cx="38" cy="37" r="22" fill="url(#orangeBand)"/>
    <text x="38" y="45" text-anchor="middle" class="row-num">3</text>
    <text x="78" y="32" class="row-name">Motor de derivación de claves</text>
    <text x="78" y="56" class="row-does">Convierte una semilla en un árbol de claves privadas. Una semilla →</text>
  </g>
  <g transform="translate(60, 544)">
    <rect width="960" height="74" rx="12" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
    <circle cx="38" cy="37" r="22" fill="url(#orangeBand)"/>
    <text x="38" y="45" text-anchor="middle" class="row-num">4</text>
    <text x="78" y="32" class="row-name">Motor de firma</text>
    <text x="78" y="56" class="row-does">Usa una clave privada para firmar una transacción. Prueba que tienes</text>
  </g>
  <g transform="translate(60, 628)">
    <rect width="960" height="74" rx="12" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
    <circle cx="38" cy="37" r="22" fill="url(#orangeBand)"/>
    <text x="38" y="45" text-anchor="middle" class="row-num">5</text>
    <text x="78" y="32" class="row-name">Interfaz de red</text>
    <text x="78" y="56" class="row-does">Difunde transacciones firmadas, consulta saldos, observa direcciones</text>
  </g>

  <!-- Key lesson band -->
  <g transform="translate(0, 970)">
    <rect width="1080" height="60" fill="url(#orangeBand)"/>
    <text x="540" y="38" text-anchor="middle" class="key-lesson">Cinco partes. Un trabajo: probar que puedes mover bitcoin sin revelar cómo.</text>
  </g>

  <!-- Footer with logo -->
  <g transform="translate(60, 1030)">
    <g transform="translate(0, 4) scale(0.20)"><title id="t">Bitcoin Sovereign Academy — Dalia signature mark</title>
  <defs>
    <linearGradient id="dL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="dR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#262626"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>
  <polygon points="50,7.8 50,92.2 8.4,50.3" fill="url(#dL)"/>
  <polygon points="50,7.8 50,92.2 91.6,49.7" fill="url(#dR)"/>
  <path d="M 22.4 42.3 Q 48 36.2 73.7 30.1" stroke="url(#g)" stroke-width="3.8" stroke-linecap="round" fill="none"/></g>
    <text x="44" y="22" class="footer">Creado por Dalia · bitcoinsovereign.academy</text>
  </g>
</svg>
