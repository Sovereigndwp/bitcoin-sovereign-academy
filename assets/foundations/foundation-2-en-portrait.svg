<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="orangeBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
    <style>
      text { font-family: "Helvetica Neue", "Inter", "Segoe UI", Arial, sans-serif; }
      .tag { font-size: 18px; font-weight: 700; letter-spacing: 4px; fill: #f7931a; }
      .title { font-size: 60px; font-weight: 900; letter-spacing: 1px; fill: #ffffff; }
      .subtitle { font-size: 22px; font-style: italic; fill: #facc15; }
      .lead { font-size: 17px; fill: #cfcfcf; }
      .card-name { font-size: 22px; font-weight: 700; fill: #f7931a; }
      .card-abbrev { font-size: 11px; font-weight: 700; letter-spacing: 2px; fill: #888; }
      .card-does { font-size: 14px; fill: #ececec; }
      .card-fails { font-size: 12px; fill: #ef6b6b; }
      .card-num { font-size: 30px; font-weight: 900; fill: #1a1a1a; }
      .arc-chip { font-size: 14px; font-weight: 700; fill: #ffffff; letter-spacing: 1px; }
      .arc-cap { font-size: 13px; font-style: italic; fill: #aaaaaa; }
      .miscon-head { font-size: 13px; font-weight: 700; letter-spacing: 4px; fill: #888; }
      .miscon-wrong { font-size: 14px; font-style: italic; fill: #ef4444; }
      .miscon-better { font-size: 14px; fill: #dddddd; }
      .miscon-mark { font-size: 16px; font-weight: 900; }
      .key-lesson { font-size: 22px; font-weight: 800; fill: #1a1a1a; letter-spacing: 0.5px; }
      .footer { font-size: 12px; fill: #888; letter-spacing: 1.5px; }
      .ill-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; fill: #555; }
      .ill-id { font-size: 8px; fill: #444; }
    </style>
  </defs>

  <rect width="1024" height="1536" fill="url(#bg)"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1024" height="3" fill="url(#orangeBand)"/>
  <text x="60" y="62" class="tag">FOUNDATION 2 OF 5</text>

  <text x="60" y="138" class="title">ANATOMY OF A BITCOIN</text>
  <text x="60" y="198" class="title">WALLET</text>

  <text x="60" y="234" class="subtitle">A wallet is not one thing. It&#x27;s a small system that does</text>
  <text x="60" y="262" class="subtitle">five jobs at once.</text>

  <text x="60" y="294" class="lead">A Bitcoin wallet is software (or hardware) that holds the parts you need to prove</text>
  <text x="60" y="316" class="lead">ownership and move bitcoin. Open one up and you&#x27;ll find five components — each doing</text>
  <text x="60" y="338" class="lead">distinct work.</text>

  <line x1="60" y1="356" x2="964" y2="356" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 5 component cards -->
  <g transform="translate(60, 372)">
    <rect width="904" height="110" rx="14" fill="url(#cardGrad)" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Numbered orange disc -->
    <circle cx="58" cy="55" r="30" fill="url(#orangeBand)"/>
    <text x="58" y="66" text-anchor="middle" class="card-num">1</text>

    <!-- Illustration placeholder (right) -->
    <g transform="translate(794, 15)">
      <rect width="80" height="80" rx="10" fill="#0a0a0a" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="40" y="38" text-anchor="middle" class="ill-label">ILL</text>
      <text x="40" y="54" text-anchor="middle" class="ill-id">ill-rng</text>
    </g>

    <!-- Text -->
    <text x="110" y="32" class="card-name">Random number generator</text>
    <text x="110" y="50" class="card-abbrev">RNG</text>
    <text x="110" y="76" class="card-does">Produces the entropy that becomes the seed.</text>
    <text x="110" y="94" class="card-fails">If it fails: A weak RNG means the seed is guessable from day one. Everything built</text>
    <text x="110" y="108" class="card-fails">on top is compromised.</text>
  </g>
  <g transform="translate(60, 490)">
    <rect width="904" height="110" rx="14" fill="url(#cardGrad)" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Numbered orange disc -->
    <circle cx="58" cy="55" r="30" fill="url(#orangeBand)"/>
    <text x="58" y="66" text-anchor="middle" class="card-num">2</text>

    <!-- Illustration placeholder (right) -->
    <g transform="translate(794, 15)">
      <rect width="80" height="80" rx="10" fill="#0a0a0a" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="40" y="38" text-anchor="middle" class="ill-label">ILL</text>
      <text x="40" y="54" text-anchor="middle" class="ill-id">ill-seed</text>
    </g>

    <!-- Text -->
    <text x="110" y="32" class="card-name">Seed phrase storage</text>
    <text x="110" y="50" class="card-abbrev">BIP39</text>
    <text x="110" y="76" class="card-does">Turns the entropy + checksum into 12 or 24 readable</text>
    <text x="110" y="94" class="card-does">words. The human backup.</text>
    <text x="110" y="112" class="card-fails">If it fails: Lose the seed phrase and you lose every key the wallet ever derives.</text>
  </g>
  <g transform="translate(60, 608)">
    <rect width="904" height="110" rx="14" fill="url(#cardGrad)" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Numbered orange disc -->
    <circle cx="58" cy="55" r="30" fill="url(#orangeBand)"/>
    <text x="58" y="66" text-anchor="middle" class="card-num">3</text>

    <!-- Illustration placeholder (right) -->
    <g transform="translate(794, 15)">
      <rect width="80" height="80" rx="10" fill="#0a0a0a" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="40" y="38" text-anchor="middle" class="ill-label">ILL</text>
      <text x="40" y="54" text-anchor="middle" class="ill-id">ill-derive</text>
    </g>

    <!-- Text -->
    <text x="110" y="32" class="card-name">Key derivation engine</text>
    <text x="110" y="50" class="card-abbrev">BIP32</text>
    <text x="110" y="76" class="card-does">Turns one seed into a tree of private keys. One seed →</text>
    <text x="110" y="94" class="card-does">millions of keys.</text>
    <text x="110" y="112" class="card-fails">If it fails: Same 12 words, different derivation paths &#x3D; different wallets. Not a</text>
    <text x="110" y="126" class="card-fails">contradiction, a configuration.</text>
  </g>
  <g transform="translate(60, 726)">
    <rect width="904" height="110" rx="14" fill="url(#cardGrad)" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Numbered orange disc -->
    <circle cx="58" cy="55" r="30" fill="url(#orangeBand)"/>
    <text x="58" y="66" text-anchor="middle" class="card-num">4</text>

    <!-- Illustration placeholder (right) -->
    <g transform="translate(794, 15)">
      <rect width="80" height="80" rx="10" fill="#0a0a0a" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="40" y="38" text-anchor="middle" class="ill-label">ILL</text>
      <text x="40" y="54" text-anchor="middle" class="ill-id">ill-sign</text>
    </g>

    <!-- Text -->
    <text x="110" y="32" class="card-name">Signing engine</text>
    <text x="110" y="50" class="card-abbrev">ECDSA / Schnorr</text>
    <text x="110" y="76" class="card-does">Uses a private key to sign a transaction. Proof you have</text>
    <text x="110" y="94" class="card-does">the right to spend.</text>
    <text x="110" y="112" class="card-fails">If it fails: The wallet can read balances but cannot move funds.</text>
  </g>
  <g transform="translate(60, 844)">
    <rect width="904" height="110" rx="14" fill="url(#cardGrad)" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Numbered orange disc -->
    <circle cx="58" cy="55" r="30" fill="url(#orangeBand)"/>
    <text x="58" y="66" text-anchor="middle" class="card-num">5</text>

    <!-- Illustration placeholder (right) -->
    <g transform="translate(794, 15)">
      <rect width="80" height="80" rx="10" fill="#0a0a0a" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="40" y="38" text-anchor="middle" class="ill-label">ILL</text>
      <text x="40" y="54" text-anchor="middle" class="ill-id">ill-network</text>
    </g>

    <!-- Text -->
    <text x="110" y="32" class="card-name">Network interface</text>
    <text x="110" y="50" class="card-abbrev">P2P</text>
    <text x="110" y="76" class="card-does">Broadcasts signed transactions, queries balances,</text>
    <text x="110" y="94" class="card-does">watches addresses for incoming payments.</text>
    <text x="110" y="112" class="card-fails">If it fails: The wallet can sign but cannot transmit. Intentional on air-gapped</text>
    <text x="110" y="126" class="card-fails">signing devices.</text>
  </g>

  <!-- Derivation arc -->
  <g transform="translate(0, 976)">
    <g transform="translate(135, 0)">
      <rect width="130" height="40" rx="20" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="1.5"/>
      <text x="65" y="26" text-anchor="middle" class="arc-chip">RNG</text>
    </g>
    <g transform="translate(291, 0)">
      <rect width="130" height="40" rx="20" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="1.5"/>
      <text x="65" y="26" text-anchor="middle" class="arc-chip">Seed</text>
    </g>
    <g transform="translate(447, 0)">
      <rect width="130" height="40" rx="20" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="1.5"/>
      <text x="65" y="26" text-anchor="middle" class="arc-chip">Key tree</text>
    </g>
    <g transform="translate(603, 0)">
      <rect width="130" height="40" rx="20" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="1.5"/>
      <text x="65" y="26" text-anchor="middle" class="arc-chip">Signing</text>
    </g>
    <g transform="translate(759, 0)">
      <rect width="130" height="40" rx="20" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="1.5"/>
      <text x="65" y="26" text-anchor="middle" class="arc-chip">Network</text>
    </g>
    <line x1="267" y1="20" x2="285" y2="20" stroke="#f7931a" stroke-width="2"/>
    <polygon points="285,20 277,14 277,26" fill="#f7931a"/>
    <line x1="423" y1="20" x2="441" y2="20" stroke="#f7931a" stroke-width="2"/>
    <polygon points="441,20 433,14 433,26" fill="#f7931a"/>
    <line x1="579" y1="20" x2="597" y2="20" stroke="#f7931a" stroke-width="2"/>
    <polygon points="597,20 589,14 589,26" fill="#f7931a"/>
    <line x1="735" y1="20" x2="753" y2="20" stroke="#f7931a" stroke-width="2"/>
    <polygon points="753,20 745,14 745,26" fill="#f7931a"/>
  </g>

  <text x="512" y="1042" text-anchor="middle" class="arc-cap">Five jobs in one chain. Strong randomness becomes a backup, becomes a key tree, becomes a</text>
  <text x="512" y="1060" text-anchor="middle" class="arc-cap">signature, becomes a transaction. Every step depends on the one before.</text>

  <!-- Misconceptions -->
  <text x="60" y="1090" class="miscon-head">COMMON MISCONCEPTIONS</text>
  <g transform="translate(60, 1108)">
    <text x="0" y="14" class="miscon-mark" fill="#ef4444">✗</text>
    <text x="22" y="14" class="miscon-wrong">"My wallet stores my bitcoin."</text>
    <text x="0" y="36" class="miscon-mark" fill="#22c55e">✓</text>
    <text x="22" y="36" class="miscon-better">Bitcoin lives on the network. Your wallet stores the keys that let you move it.</text>
  </g>
  <g transform="translate(60, 1164)">
    <text x="0" y="14" class="miscon-mark" fill="#ef4444">✗</text>
    <text x="22" y="14" class="miscon-wrong">"Hot vs cold is the only safety distinction that matters."</text>
    <text x="0" y="36" class="miscon-mark" fill="#22c55e">✓</text>
    <text x="22" y="36" class="miscon-better">The components matter more. A cold wallet with a weak RNG isn&#x27;t safe; a hot wallet with</text>
    <text x="22" y="52" class="miscon-better">strong key isolation can be safer than you&#x27;d guess.</text>
  </g>
  <g transform="translate(60, 1220)">
    <text x="0" y="14" class="miscon-mark" fill="#ef4444">✗</text>
    <text x="22" y="14" class="miscon-wrong">"All wallets that take 12 words are equivalent."</text>
    <text x="0" y="36" class="miscon-mark" fill="#22c55e">✓</text>
    <text x="22" y="36" class="miscon-better">Different wallets implement different derivation paths, address types, and passphrase</text>
    <text x="22" y="52" class="miscon-better">models. Same words ≠ same wallet.</text>
  </g>
  <g transform="translate(60, 1276)">
    <text x="0" y="14" class="miscon-mark" fill="#ef4444">✗</text>
    <text x="22" y="14" class="miscon-wrong">"My wallet&#x27;s password protects my bitcoin."</text>
    <text x="0" y="36" class="miscon-mark" fill="#22c55e">✓</text>
    <text x="22" y="36" class="miscon-better">The password protects access to the wallet software on one device. The seed phrase is</text>
    <text x="22" y="52" class="miscon-better">what protects the bitcoin across all devices, all time.</text>
  </g>

  <!-- Key lesson band -->
  <g transform="translate(0, 1416)">
    <rect width="1024" height="60" fill="url(#orangeBand)"/>
    <text x="512" y="38" text-anchor="middle" class="key-lesson">Five parts. One job: prove you can move bitcoin without giving away how.</text>
  </g>

  <!-- Footer with logo -->
  <g transform="translate(60, 1476)">
    <g transform="translate(0, 4) scale(0.20)">
      <title id="t">Bitcoin Sovereign Academy — Dalia signature mark</title>
  <defs>
    <linearGradient id="dL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="dR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#262626"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>
  <polygon points="50,7.8 50,92.2 8.4,50.3" fill="url(#dL)"/>
  <polygon points="50,7.8 50,92.2 91.6,49.7" fill="url(#dR)"/>
  <path d="M 22.4 42.3 Q 48 36.2 73.7 30.1" stroke="url(#g)" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    </g>
    <text x="44" y="22" class="footer">Created by Dalia · bitcoinsovereign.academy</text>
  </g>
</svg>
