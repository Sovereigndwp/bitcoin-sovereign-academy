<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="orangeBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <style>
      text { font-family: "Helvetica Neue", "Inter", "Segoe UI", Arial, sans-serif; }
      .tag { font-size: 16px; font-weight: 700; letter-spacing: 4px; fill: #f7931a; }
      .title { font-weight: 900; letter-spacing: 1px; fill: #ffffff; }
      .subtitle { font-size: 19px; font-style: italic; fill: #facc15; }
      .arc-chip { font-size: 14px; font-weight: 700; fill: #ffffff; letter-spacing: 1px; }
      .key-lesson { font-size: 18px; font-weight: 800; fill: #1a1a1a; }
      .footer { font-size: 12px; fill: #888; letter-spacing: 1.5px; }
    </style>
  </defs>

  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#orangeBand)"/>

  <!-- Header -->
  <text x="60" y="56" class="tag">FUNDAMENTO 2 DE 5</text>
  <text x="60" y="102" class="title" font-size="36">ANATOMÍA DE UNA BILLETERA BITCOIN</text>
  <text x="60" y="134" class="subtitle">Una billetera no es una sola cosa. Es un pequeño sistema que hace cinco</text>
  <text x="60" y="158" class="subtitle">trabajos a la vez.</text>

  <!-- Arc as hero (centered) -->
  <g transform="translate(0, 188)">
    <g transform="translate(159, 0)">
      <rect width="154" height="44" rx="22" fill="rgba(247,147,26,0.14)" stroke="#f7931a" stroke-width="2"/>
      <text x="77" y="29" text-anchor="middle" class="arc-chip">RNG</text>
    </g>
    <g transform="translate(341, 0)">
      <rect width="154" height="44" rx="22" fill="rgba(247,147,26,0.14)" stroke="#f7931a" stroke-width="2"/>
      <text x="77" y="29" text-anchor="middle" class="arc-chip">Semilla</text>
    </g>
    <g transform="translate(523, 0)">
      <rect width="154" height="44" rx="22" fill="rgba(247,147,26,0.14)" stroke="#f7931a" stroke-width="2"/>
      <text x="77" y="29" text-anchor="middle" class="arc-chip">Árbol</text>
    </g>
    <g transform="translate(705, 0)">
      <rect width="154" height="44" rx="22" fill="rgba(247,147,26,0.14)" stroke="#f7931a" stroke-width="2"/>
      <text x="77" y="29" text-anchor="middle" class="arc-chip">Firma</text>
    </g>
    <g transform="translate(887, 0)">
      <rect width="154" height="44" rx="22" fill="rgba(247,147,26,0.14)" stroke="#f7931a" stroke-width="2"/>
      <text x="77" y="29" text-anchor="middle" class="arc-chip">Red</text>
    </g>
    <line x1="315" y1="22" x2="335" y2="22" stroke="#f7931a" stroke-width="2"/>
    <polygon points="335,22 327,16 327,28" fill="#f7931a"/>
    <line x1="497" y1="22" x2="517" y2="22" stroke="#f7931a" stroke-width="2"/>
    <polygon points="517,22 509,16 509,28" fill="#f7931a"/>
    <line x1="679" y1="22" x2="699" y2="22" stroke="#f7931a" stroke-width="2"/>
    <polygon points="699,22 691,16 691,28" fill="#f7931a"/>
    <line x1="861" y1="22" x2="881" y2="22" stroke="#f7931a" stroke-width="2"/>
    <polygon points="881,22 873,16 873,28" fill="#f7931a"/>
  </g>

  <!-- Key lesson band -->
  <g transform="translate(0, 539)">
    <rect width="1200" height="48" fill="url(#orangeBand)"/>
    <text x="600" y="31" text-anchor="middle" class="key-lesson">Cinco partes. Un trabajo: probar que puedes mover bitcoin sin revelar cómo.</text>
  </g>

  <!-- Footer with logo -->
  <g transform="translate(60, 587)">
    <g transform="translate(0, 4) scale(0.18)"><title id="t">Bitcoin Sovereign Academy — Dalia signature mark</title>
  <defs>
    <linearGradient id="dL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="dR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#262626"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>
  <polygon points="50,7.8 50,92.2 8.4,50.3" fill="url(#dL)"/>
  <polygon points="50,7.8 50,92.2 91.6,49.7" fill="url(#dR)"/>
  <path d="M 22.4 42.3 Q 48 36.2 73.7 30.1" stroke="url(#g)" stroke-width="3.8" stroke-linecap="round" fill="none"/></g>
    <text x="40" y="20" class="footer">Creado por Dalia · bitcoinsovereign.academy</text>
  </g>
</svg>
