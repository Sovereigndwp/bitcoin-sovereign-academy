<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Key derivation: hierarchical tree (one root, branches multiply) -->
  <g transform="translate(50 50)">
    <!-- branches as connecting paths -->
    <g stroke="#f7931a" stroke-width="1.6" fill="none" stroke-linecap="round">
      <!-- root → 2 children -->
      <path d="M 0 -32 L -18 -10"/>
      <path d="M 0 -32 L 18 -10"/>
      <!-- left child → 2 grandchildren -->
      <path d="M -18 -10 L -28 12"/>
      <path d="M -18 -10 L -10 12"/>
      <!-- right child → 2 grandchildren -->
      <path d="M 18 -10 L 10 12"/>
      <path d="M 18 -10 L 28 12"/>
      <!-- leaves: a couple of greatgrandchildren on outermost -->
      <path d="M -28 12 L -32 28"/>
      <path d="M -28 12 L -22 28"/>
      <path d="M 28 12 L 22 28"/>
      <path d="M 28 12 L 32 28"/>
    </g>
    <!-- nodes -->
    <circle cx="0" cy="-32" r="4.5" fill="#facc15" stroke="#f7931a" stroke-width="1"/>
    <circle cx="-18" cy="-10" r="3.5" fill="#f7931a"/>
    <circle cx="18" cy="-10" r="3.5" fill="#f7931a"/>
    <circle cx="-28" cy="12" r="2.6" fill="#f7931a"/>
    <circle cx="-10" cy="12" r="2.6" fill="#f7931a"/>
    <circle cx="10" cy="12" r="2.6" fill="#f7931a"/>
    <circle cx="28" cy="12" r="2.6" fill="#f7931a"/>
    <circle cx="-32" cy="28" r="1.8" fill="#facc15"/>
    <circle cx="-22" cy="28" r="1.8" fill="#facc15"/>
    <circle cx="22" cy="28" r="1.8" fill="#facc15"/>
    <circle cx="32" cy="28" r="1.8" fill="#facc15"/>
  </g>
</svg>
