<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Signing: pen tip drawing a signature; key motif at right -->
  <g transform="translate(50 50)">
    <!-- signature loop -->
    <path d="M -34 12 Q -26 -6 -18 6 Q -10 18 -2 -2 Q 6 -18 14 6"
          fill="none" stroke="#f7931a" stroke-width="2.2" stroke-linecap="round"/>
    <!-- signature underline (dashed) -->
    <line x1="-34" y1="22" x2="22" y2="22" stroke="#facc15" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2 3"/>
    <!-- pen body -->
    <g transform="rotate(-35 14 -8)">
      <rect x="14" y="-14" width="22" height="6" rx="1" fill="#1a1a1a" stroke="#f7931a" stroke-width="1.4"/>
      <polygon points="36,-14 44,-11 36,-8" fill="#f7931a"/>
    </g>
    <!-- key motif -->
    <g transform="translate(20 -28)">
      <circle cx="0" cy="0" r="5" fill="none" stroke="#facc15" stroke-width="1.6"/>
      <line x1="5" y1="0" x2="14" y2="0" stroke="#facc15" stroke-width="1.6"/>
      <line x1="11" y1="0" x2="11" y2="3" stroke="#facc15" stroke-width="1.6"/>
      <line x1="14" y1="0" x2="14" y2="4" stroke="#facc15" stroke-width="1.6"/>
    </g>
  </g>
</svg>
