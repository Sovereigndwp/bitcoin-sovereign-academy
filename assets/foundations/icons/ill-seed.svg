<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Seed phrase storage: numbered notepad with words -->
  <g transform="translate(50 50)">
    <!-- pad backing -->
    <rect x="-30" y="-34" width="60" height="68" rx="4" fill="#0e0e0e" stroke="#f7931a" stroke-width="1.6"/>
    <!-- top binding -->
    <line x1="-26" y1="-30" x2="26" y2="-30" stroke="#f7931a" stroke-width="0.8" stroke-dasharray="2 2"/>
    <!-- 6 word lines with row numbers -->
    <g font-family="Helvetica Neue, Arial, sans-serif" font-size="6" fill="#facc15">
      <text x="-23" y="-18">1</text>
      <text x="-23" y="-7">2</text>
      <text x="-23" y="4">3</text>
      <text x="-23" y="15">4</text>
      <text x="-23" y="26">5</text>
    </g>
    <line x1="-15" y1="-19" x2="22" y2="-19" stroke="#f7931a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-15" y1="-8" x2="18" y2="-8" stroke="#f7931a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-15" y1="3" x2="22" y2="3" stroke="#f7931a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-15" y1="14" x2="14" y2="14" stroke="#f7931a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-15" y1="25" x2="20" y2="25" stroke="#f7931a" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
