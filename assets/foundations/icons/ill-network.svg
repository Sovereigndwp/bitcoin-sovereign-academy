<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Network interface: broadcasting node connected to peers + radio waves -->
  <g transform="translate(50 50)">
    <!-- outer wave -->
    <path d="M -32 -10 A 34 34 0 0 1 32 -10" fill="none" stroke="#f7931a" stroke-width="1.4" stroke-dasharray="3 3"/>
    <!-- mid wave -->
    <path d="M -22 -8 A 24 24 0 0 1 22 -8" fill="none" stroke="#facc15" stroke-width="1.4"/>
    <!-- inner wave -->
    <path d="M -12 -6 A 14 14 0 0 1 12 -6" fill="none" stroke="#f7931a" stroke-width="1.4"/>
    <!-- center node (broadcasting) -->
    <circle cx="0" cy="0" r="4.5" fill="#facc15" stroke="#f7931a" stroke-width="1.4"/>
    <!-- peer nodes around the bottom -->
    <line x1="0" y1="0" x2="-26" y2="22" stroke="#f7931a" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="26" y2="22" stroke="#f7931a" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="28" stroke="#f7931a" stroke-width="1.2"/>
    <circle cx="-26" cy="22" r="3.2" fill="#f7931a"/>
    <circle cx="26" cy="22" r="3.2" fill="#f7931a"/>
    <circle cx="0" cy="28" r="3.2" fill="#f7931a"/>
    <!-- horizontal connection between peers -->
    <line x1="-26" y1="22" x2="0" y2="28" stroke="#f7931a" stroke-width="0.8" stroke-dasharray="1.5 1.5"/>
    <line x1="0" y1="28" x2="26" y2="22" stroke="#f7931a" stroke-width="0.8" stroke-dasharray="1.5 1.5"/>
  </g>
</svg>
