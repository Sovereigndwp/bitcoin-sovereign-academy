<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Random number generator: a tilted die showing all sides scattered with dots -->
  <defs>
    <linearGradient id="rngFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <g transform="translate(50 52)">
    <!-- top face -->
    <polygon points="0,-26 24,-14 0,-2 -24,-14" fill="#181818" stroke="#f7931a" stroke-width="1.6"/>
    <!-- left face -->
    <polygon points="-24,-14 0,-2 0,26 -24,14" fill="url(#rngFace)" stroke="#f7931a" stroke-width="1.6"/>
    <!-- right face -->
    <polygon points="24,-14 0,-2 0,26 24,14" fill="#0e0e0e" stroke="#f7931a" stroke-width="1.6"/>
    <!-- pips on top face: scattered (entropy) -->
    <circle cx="-10" cy="-15" r="1.8" fill="#f7931a"/>
    <circle cx="6" cy="-12" r="1.8" fill="#f7931a"/>
    <circle cx="-2" cy="-8" r="1.8" fill="#f7931a"/>
    <!-- pips on left face: 2 -->
    <circle cx="-16" cy="-2" r="1.6" fill="#facc15"/>
    <circle cx="-8" cy="14" r="1.6" fill="#facc15"/>
    <!-- pips on right face: 3 -->
    <circle cx="6" cy="2" r="1.6" fill="#facc15"/>
    <circle cx="14" cy="6" r="1.6" fill="#facc15"/>
    <circle cx="10" cy="14" r="1.6" fill="#facc15"/>
  </g>
</svg>
